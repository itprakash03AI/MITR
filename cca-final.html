<div id="app">

<!-- TOP NAV -->
<div id="topnav">
  <div id="logo">
    <span class="logo-badge">CCA</span>
    <span class="logo-text">COMPLETE GUIDE</span>
  </div>
  <div id="breadcrumb"></div>
  <div id="prog-wrap">
    <div id="prog-bar"><div id="prog-fill"></div></div>
    <span id="prog-label">0/47</span>
  </div>
</div>

<!-- DOMAIN TABS -->
<div id="domain-tabs"></div>

<!-- BODY -->
<div id="body">
  <div id="sidebar">
    <div id="sidebar-head">
      <div id="sb-domain-label"></div>
      <div id="sb-domain-name"></div>
      <div id="sb-tagline"></div>
      <div id="sb-pill"></div>
    </div>
    <div id="section-list"></div>
  </div>
  <div id="main">
    <div id="content-wrap"></div>
  </div>
</div>

</div>
<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const DATA = JSON.parse(document.getElementById('cca-data').textContent);

const NEW_TITLES = new Set([
  "stop_reason \u2014 The Correct Loop Termination Pattern",
  "The Task Tool \u2014 Native Multi-Agent Delegation",
  "Tool Count Limit \u2014 4 to 5 Tools Max",
  "MCP Configuration \u2014 .mcp.json",
  "Tool Error Structure \u2014 isError, isRetryable, errorCategory",
  "Plan Mode vs Direct Execution",
  "Message Batches API \u2014 50% Cost Savings",
  "Independent Review Instances",
  "Information Provenance",
  "Out-of-Scope Topics \u2014 What NOT to Study",
  "Session Management & State Persistence",
  "Error Propagation Across Agents",
  "Escalation Design \u2014 Sentiment vs Complexity",
  "Tool Description Quality \u2014 The Real Selection Driver",
  "Prompt Caching \u2014 50% Cost Reduction for Repeated Context",
  ".claude/rules/ Glob Patterns & context:fork",
  "Iterative Refinement & TDD Pattern",
  "tool_use for Structured Output",
  "Lost in the Middle Effect",
  "Verbose Tool Output Trimming & Scratchpad Persistence"
]);

const D_COLORS = ['#e05c3a','#3aace0','#3ae07a','#e0b83a','#b03ae0'];
const TOTAL = DATA.reduce((s,d)=>s+d.sections.length,0);

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  page: 'index',   // 'index' | 'section'
  dIdx: 0,
  sIdx: 0,
  showCode: true,
  studied: {}
};

function sKey(d,s){ return d+'-'+s; }
function doneCount(){ return Object.values(state.studied).filter(Boolean).length; }
function D(){ return DATA[state.dIdx]; }
function S(){ return D().sections[state.sIdx]; }
function dColor(){ return D_COLORS[state.dIdx]; }

// ── ROUTER ────────────────────────────────────────────────────────────────────
function navigate(page, dIdx, sIdx){
  state.page = page;
  if(dIdx !== undefined) state.dIdx = dIdx;
  if(sIdx !== undefined) state.sIdx = sIdx;
  render();
  document.getElementById('main').scrollTop = 0;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  renderTabs();
  renderSidebar();
  renderBreadcrumb();
  renderProgress();
  state.page === 'section' ? renderSection() : renderIndex();
}

function renderProgress(){
  const done = doneCount();
  document.getElementById('prog-fill').style.width = (done/TOTAL*100)+'%';
  document.getElementById('prog-label').textContent = done+'/'+TOTAL;
}

function renderBreadcrumb(){
  const bc = document.getElementById('breadcrumb');
  if(state.page === 'index'){
    bc.innerHTML = '<span class="bc-current">All Domains</span>';
  } else {
    const d = D(), s = S();
    bc.innerHTML =
      '<a class="bc-link" href="#" onclick="navigate(\'index\');return false;">All Domains</a>' +
      '<span class="bc-sep"> / </span>' +
      '<span class="bc-current">D'+(state.dIdx+1)+' \u00b7 '+(state.sIdx+1)+'/'+d.sections.length+'</span>';
  }
}

function renderTabs(){
  const el = document.getElementById('domain-tabs');
  el.innerHTML = '';
  DATA.forEach(function(d,i){
    const done = d.sections.filter(function(_,j){ return state.studied[sKey(i,j)]; }).length;
    const btn = document.createElement('button');
    btn.className = 'dtab' + (i === state.dIdx ? ' active' : '');
    btn.style.borderBottomColor = i === state.dIdx ? D_COLORS[i] : 'transparent';
    btn.innerHTML =
      '<div class="dtab-top"><span>' + d.icon + '</span>' +
      '<span class="dtab-weight" style="color:'+D_COLORS[i]+'">'+d.weight+'%</span></div>' +
      '<div class="dtab-name">D'+(i+1)+' \u00b7 '+d.name.split(' ').slice(0,2).join(' ')+'</div>' +
      '<div class="dtab-stat">'+done+'/'+d.sections.length+' studied</div>';
    btn.onclick = function(){
      state.dIdx = i;
      state.sIdx = 0;
      if(state.page === 'section') render();
      else { state.page = 'section'; render(); }
    };
    el.appendChild(btn);
  });
}

function renderSidebar(){
  const d = DATA[state.dIdx];
  const c = D_COLORS[state.dIdx];
  document.getElementById('sb-domain-label').textContent = 'DOMAIN ' + (state.dIdx+1);
  document.getElementById('sb-domain-name').textContent = d.name;
  document.getElementById('sb-tagline').textContent = d.tagline;
  const pill = document.getElementById('sb-pill');
  pill.textContent = d.weight+'% of exam \u00b7 '+d.sections.length+' topics';
  pill.style.background = c + '22';
  pill.style.color = c;

  const list = document.getElementById('section-list');
  list.innerHTML = '';
  d.sections.forEach(function(s,i){
    const k = sKey(state.dIdx, i);
    const done = state.studied[k];
    const isActive = (state.page === 'section') && i === state.sIdx;
    const isNew = NEW_TITLES.has(s.title);

    const btn = document.createElement('button');
    btn.className = 'sitem' + (isActive ? ' active' : '');
    if(isActive){
      btn.style.setProperty('--d-color', c);
      btn.style.setProperty('--d-faint', c+'18');
    }
    btn.innerHTML =
      '<div class="sitem-check'+(done?' done':'')+'">'+
        (done ? '\u2713' : '') +
      '</div>' +
      '<div><div class="sitem-title">'+s.title+(isNew?'<span class="new-tag">NEW</span>':'')+'</div>'+
      '<div class="sitem-num">'+(i+1)+'/'+d.sections.length+'</div></div>';

    btn.onclick = function(e){
      if(e.target.classList.contains('sitem-check') || e.target.closest('.sitem-check')){
        state.studied[k] = !state.studied[k];
        renderProgress();
        renderSidebar();
        if(isActive) renderMarkBtn();
        return;
      }
      navigate('section', state.dIdx, i);
    };
    list.appendChild(btn);
  });
}

function renderIndex(){
  const wrap = document.getElementById('content-wrap');
  const done = doneCount();
  let html =
    '<div id="index-page">' +
    '<div class="index-title">CCA Foundations \u2014 Complete Study Guide</div>' +
    '<div class="index-sub">47 TOPICS \u00b7 5 DOMAINS \u00b7 PRAKASH</div>' +
    '<div class="index-stats">' +
      stat('47', 'TOTAL TOPICS') +
      stat('5', 'DOMAINS') +
      stat('60', 'EXAM QUESTIONS') +
      stat('720', 'PASSING SCORE') +
      stat('$99', 'EXAM COST') +
    '</div>' +
    '<div class="domain-cards">';

  DATA.forEach(function(d,i){
    const c = D_COLORS[i];
    const studiedN = d.sections.filter(function(_,j){ return state.studied[sKey(i,j)]; }).length;
    html +=
      '<div class="dcard" onclick="navigate(\'section\','+i+',0)">' +
        '<div class="dcard-icon">'+d.icon+'</div>' +
        '<div class="dcard-body">' +
          '<div class="dcard-top">' +
            '<div class="dcard-name">'+d.name+'</div>' +
            '<div class="dcard-weight" style="color:'+c+'">'+d.weight+'%</div>' +
          '</div>' +
          '<div class="dcard-tagline">'+d.tagline+'</div>' +
          '<div class="dcard-bar-wrap">' +
            '<div class="dcard-bar" style="width:'+(studiedN/d.sections.length*100)+'%;background:'+c+'"></div>' +
          '</div>' +
          '<div style="font-size:10px;color:#555;margin-top:4px;font-family:monospace">'+studiedN+'/'+d.sections.length+' studied</div>' +
        '</div>' +
        '<div class="dcard-arrow">\u203a</div>' +
      '</div>';
  });

  html += '</div></div>';
  wrap.innerHTML = html;
}

function stat(val, lbl){
  return '<div><div class="stat-val" style="color:var(--yellow)">'+val+'</div><div class="stat-lbl">'+lbl+'</div></div>';
}

function renderSection(){
  const d = D(), s = S(), c = dColor();
  const isNew = NEW_TITLES.has(s.title);
  const done = state.studied[sKey(state.dIdx, state.sIdx)];

  let html =
    '<div class="section-header">' +
      '<div class="section-meta">' +
        '<span class="section-meta-txt">DOMAIN '+(state.dIdx+1)+' \u00b7 TOPIC '+(state.sIdx+1)+'/'+d.sections.length+'</span>' +
        '<div class="meta-line"></div>' +
        '<button id="mark-btn" onclick="toggleMark()" style="border-color:'+(done?c:'var(--border)')+';color:'+(done?c:'var(--muted)')+';background:'+(done?c+'22':'none')+'">'+
          (done ? '\u2713 Studied' : 'Mark studied') +
        '</button>' +
      '</div>' +
      '<div class="section-title">'+escHtml(s.title)+(isNew?'<span class="new-badge">NEW</span>':'')+' </div>' +
    '</div>';

  html += '<div class="block-label">CONCEPT</div>';
  html += '<div class="concept-box">'+escHtml(s.content)+'</div>';

  html +=
    '<div class="code-header">' +
      '<div class="block-label" style="margin:0">CODE EXAMPLE</div>' +
      '<button id="toggle-code" onclick="toggleCode()">'+(state.showCode?'Hide':'Show')+'</button>' +
    '</div>';
  html += '<div class="code-box" id="code-box" style="display:'+(state.showCode?'block':'none')+'"><pre>'+colorizeCode(s.code)+'</pre></div>';

  html +=
    '<div class="exam-tip" style="background:'+c+'12;border-left-color:'+c+';border:1px solid '+c+'28">' +
      '<div class="exam-tip-label" style="color:'+c+'">\uD83C\uDFAF EXAM TIP</div>' +
      '<div class="exam-tip-text">'+escHtml(s.examTip)+'</div>' +
    '</div>';

  // Nav footer
  const isFirst = state.dIdx === 0 && state.sIdx === 0;
  const isLast = state.dIdx === DATA.length-1 && state.sIdx === d.sections.length-1;

  html += '<div class="nav-footer">';
  html += '<button class="nav-btn" onclick="navGo(-1)"'+(isFirst?' disabled':'')+'>&#8592; Prev</button>';

  html += '<div class="nav-center"><div class="nav-label">D'+(state.dIdx+1)+' \u00b7 '+(state.sIdx+1)+' of '+d.sections.length+'</div><div class="nav-dots">';
  d.sections.forEach(function(_,i){
    const k = sKey(state.dIdx, i);
    let bg = 'var(--border)';
    if(i === state.sIdx) bg = c;
    else if(state.studied[k]) bg = c+'66';
    html += '<div class="ndot" onclick="navigate(\'section\','+state.dIdx+','+i+')" style="background:'+bg+'"></div>';
  });
  html += '</div></div>';

  html += '<button class="nav-btn primary" onclick="navGo(1)"'+(isLast?' disabled':'')+
          ' style="background:'+(isLast?'var(--faint)':c)+';color:'+(isLast?'var(--muted)':'#000')+'">'+
          'Next &#8594;</button>';
  html += '</div>';

  document.getElementById('content-wrap').innerHTML = html;
}

function renderMarkBtn(){
  const btn = document.getElementById('mark-btn');
  if(!btn) return;
  const done = state.studied[sKey(state.dIdx, state.sIdx)];
  const c = dColor();
  btn.textContent = done ? '\u2713 Studied' : 'Mark studied';
  btn.style.borderColor = done ? c : 'var(--border)';
  btn.style.color = done ? c : 'var(--muted)';
  btn.style.background = done ? c+'22' : 'none';
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function colorizeCode(code){
  return code.split('\n').map(function(line){
    const esc = escHtml(line);
    const tr = line.trim();
    let c = '#c0bbb0';
    if(tr.startsWith('#')){
      if(line.includes('GOOD')||line.includes('CORRECT')||line.includes('Fix:')) c='#4ec994';
      else if(line.includes('BAD')||line.includes('WRONG')||line.includes('Never')) c='#e05c5a';
      else if(line.includes('MEMORIZE')||line.includes('CRITICAL')||line.includes('EXAM')||line.includes('CORRECTION')) c='#f0c040';
      else c='#6a9955';
    } else if(tr.startsWith('class ')||tr.startsWith('def ')||tr.startsWith('async def ')) c='#dcdcaa';
    else if(tr.startsWith('import ')||tr.startsWith('from ')) c='#c586c0';
    return '<span style="color:'+c+'">'+esc+'</span>';
  }).join('\n');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleMark(){
  const k = sKey(state.dIdx, state.sIdx);
  state.studied[k] = !state.studied[k];
  renderProgress();
  renderSidebar();
  renderMarkBtn();
}

function toggleCode(){
  state.showCode = !state.showCode;
  const box = document.getElementById('code-box');
  const btn = document.getElementById('toggle-code');
  if(box) box.style.display = state.showCode ? 'block' : 'none';
  if(btn) btn.textContent = state.showCode ? 'Hide' : 'Show';
}

function navGo(dir){
  const d = D();
  state.studied[sKey(state.dIdx, state.sIdx)] = true;
  if(dir === 1){
    if(state.sIdx < d.sections.length-1) state.sIdx++;
    else if(state.dIdx < DATA.length-1){ state.dIdx++; state.sIdx=0; }
  } else {
    if(state.sIdx > 0) state.sIdx--;
    else if(state.dIdx > 0){ state.dIdx--; state.sIdx=DATA[state.dIdx].sections.length-1; }
  }
  render();
  document.getElementById('main').scrollTop = 0;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
