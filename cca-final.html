nges. Use direct for small, safe, clearly-scoped tasks."},{"title":".claude/rules/ Glob Patterns & context:fork","content":"Two specific Claude Code configuration features that are explicitly tested in Domain 3.\n\n.claude/rules/ GLOB PATTERNS:\nInstead of putting all rules in CLAUDE.md, you can create scoped rule files in .claude/rules/ that apply only to files matching a specific glob pattern. Each file uses a 'glob:' frontmatter key.\n\nExamples:\n- .claude/rules/python-core.md with glob: src/core/**/*.py\n- .claude/rules/api-routes.md with glob: src/api/**/*.py\n- .claude/rules/test-files.md with glob: tests/**/*.py\n\nThis is more granular than the 3-level CLAUDE.md hierarchy. Use it when different parts of your codebase need different rules -- strict rules for core modules, relaxed rules for test files.\n\ncontext:fork IN SKILLS FRONTMATTER:\nWhen a skill has context: fork in its CLAUDE.md frontmatter, that skill runs in an isolated sub-agent. This prevents the skill's verbose output from polluting the main session context.\n\nWHY context:fork:\nSome skills produce enormous intermediate outputs (e.g., 'analyze entire codebase'). Without forking, all that output fills the main context window. With forking, only the final result returns to the main session.\n\nEXAM RULE: Use context:fork for skills that produce verbose output you do not need in the main context.","code":"# .claude/rules/ directory -- scoped rule files with glob patterns\n\n# .claude/rules/python-core.md\n---\nglob: src/core/**/*.py\n---\nStrict rules for core modules:\n- Full type annotations required on all functions\n- No Optional types without explicit None checks\n- Zero tolerance for inline SQL\n\n# .claude/rules/test-files.md\n---\nglob: tests/**/*.py\n---\nTest file rules (relaxed from core):\n- Type annotations optional\n- print() allowed for debugging\n- Direct DB fixtures allowed\n\n# .claude/rules/api-routes.md\n---\nglob: src/api/**/*.py\n---\nAPI route rules:\n- All routes must have @require_auth decorator\n- No business logic in route functions\n\n# These rules apply ONLY to matching files\n# Different files, different rules -- more granular than CLAUDE.md hierarchy\n\n# ------------------------------------------------\n# context:fork in CLAUDE.md skills frontmatter\n\n---\nname: analyze-codebase\ndescription: Full codebase analysis for tech debt\ncontext: fork           # Runs in isolated sub-agent\nallowed-tools: Read, Grep, Glob\n---\n\nAnalyze the entire codebase for unused code, duplicate logic,\nmissing test coverage, and security vulnerabilities.\n\n# WITHOUT context:fork:\n# 50,000 tokens of analysis output fills main context window\n# Main session hits context limit mid-task\n\n# WITH context:fork:\n# Sub-agent runs in isolation\n# Only the final summary (500 tokens) returns to main session\n# Main context window stays clean and usable","examTip":"Two D3-specific features: 1) .claude/rules/ glob patterns -- rule files scoped to file patterns using 'glob:' frontmatter key, more granular than CLAUDE.md hierarchy. 2) context:fork in skills frontmatter -- runs skill in isolated sub-agent so verbose output does not pollute main context. Both appear in the Developer Productivity and CI/CD scenarios."},{"title":"Iterative Refinement & TDD Pattern","content":"Claude Code is designed for iterative workflows, not one-shot generation. The exam tests the TDD pattern specifically.\n\nTHE TDD PATTERN WITH CLAUDE CODE:\n1. Write failing tests first -- this defines the exact specification\n2. Ask Claude Code to implement code to make the tests pass\n3. Claude runs the tests, sees failures, iterates\n4. Claude continues until all tests pass\n5. Human reviews the final result\n\nWHY TDD IS MORE RELIABLE:\nThe tests are a programmatic specification that defines exactly what done means. Claude cannot hallucinate a passing test -- the test runner is the ground truth. This makes TDD more reliable than asking Claude to write code and tests together.\n\nITERATIVE REFINEMENT IS NORMAL AND EXPECTED:\nClaude Code loops: write then run then observe error then fix then repeat. Iterating 10-15 cycles on a complex task is normal. Do not confuse this with the infinite loop anti-pattern. The difference: iterative refinement makes progress each cycle. The infinite loop anti-pattern has the same error repeating with no progress.\n\nFEEDBACK QUALITY:\nSpecific assertion messages lead to faster convergence. Vague assertions lead to slow or no convergence. Write descriptive assertion messages -- they ARE the feedback.\n\nWHEN TO INTERRUPT:\nSame error repeating 3+ cycles with no progress = time to provide human guidance on the specific blocker.","code":"# TDD pattern with Claude Code\n\n# Step 1: Write FAILING tests first -- defines the specification\n'''\n# tests/test_invoice_parser.py\ndef test_extract_invoice_number():\n    result = parse_invoice('Invoice #INV-2024-001 from Acme Corp')\n    assert result['invoice_number'] == 'INV-2024-001', \\\n        f\"Expected INV-2024-001, got {result.get('invoice_number')}\"\n\ndef test_handles_missing_invoice_number():\n    result = parse_invoice('Total due: $500')\n    assert result['invoice_number'] is None\n\ndef test_rejects_non_invoice():\n    result = parse_invoice('Hello world')\n    assert result['error'] == 'not_an_invoice'\n'''\n\n# Step 2: Ask Claude Code to implement\n# claude 'Implement parse_invoice() in src/parsers/invoice.py to pass all tests'\n\n# Claude Code will:\n# 1. Read the tests to understand requirements exactly\n# 2. Write initial implementation\n# 3. Run: pytest tests/test_invoice_parser.py\n# 4. See specific failure with your assertion message\n# 5. Fix exactly what failed\n# 6. Re-run tests, iterate until all pass\n\n# BAD test -- vague failure (Claude cannot fix efficiently)\nassert result  # AssertionError -- no detail whatsoever\n\n# GOOD test -- specific failure (Claude fixes precisely)\nassert result['total'] == 1250.00, \\\n    f\"Expected total=1250.00 got {result.get('total')} from input: {text[:50]}\"\n\n# Headless CI mode\n# claude --print --allowedTools 'Read,Write,Bash' \\\n#   'Run failing tests, implement fixes, iterate until all tests pass'\n\n# Normal: 10-15 iterations on complex tasks\n# Anti-pattern: same error 3+ times with no progress (needs human guidance)","examTip":"TDD pattern is tested in the Code Generation with Claude Code scenario. Key insight: the test runner is ground truth -- Claude cannot hallucinate a passing test. TDD is MORE reliable than writing code and tests together. Iterating many cycles is NORMAL -- do not confuse with the infinite loop anti-pattern. The difference is whether progress is being made."}]},{"id":4,"weight":20,"color":"#e0b83a","name":"Prompt Engineering & Structured Output","tagline":"Communicate precisely. Enforce output reliability. The foundational skill.","icon":"\ud83d\udcd0","sections":[{"title":"System Prompt Architecture","content":"The system prompt is your primary contract with Claude. A well-architected system prompt produces consistent, reliable outputs.\n\nANATOMY OF A PRODUCTION SYSTEM PROMPT (in order):\n\n1. ROLE AND IDENTITY \u2014 who is Claude in this context? Be specific.\n   'You are a data extraction agent for enterprise invoice processing.'\n   NOT 'You are a helpful assistant.'\n\n2. TASK DEFINITION \u2014 what exactly should Claude do? Define scope precisely.\n   'Extract invoice metadata from text. Return only structured JSON.'\n\n3. CONSTRAINTS \u2014 what should Claude NOT do? Explicit restrictions.\n   'Never infer values. Never include reasoning in the output.'\n\n4. OUTPUT FORMAT \u2014 exactly how should Claude structure its response?\n   Include the exact schema if JSON is expected.\n\n5. EXAMPLES \u2014 positive and negative examples of desired behavior.\n\n6. EDGE CASE HANDLING \u2014 what to do with ambiguous or invalid inputs.\n   'If the input is not an invoice, return {error: not_an_invoice}'\n\nORDER MATTERS: Claude weights earlier content more heavily. Put the most critical rules first.","code":"# Well-structured production system prompt\n\nSYSTEM = \"\"\"\n# Role\nYou are a data extraction agent for enterprise invoice processing.\nExtract structured data from invoice text with high precision.\n\n# Task\nExtract invoice metadata. Return ONLY valid JSON.\nDo not infer values \u2014 extract only what is explicitly present.\n\n# Constraints\n- Never hallucinate fields not in the source text\n- If a required field is absent, set it to null\n- Reject non-invoice inputs with {\"error\": \"not_an_invoice\"}\n- Never include reasoning \u2014 return only the JSON object\n\n# Output Format (REQUIRED \u2014 match exactly)\n{\n  \"invoice_number\": string | null,\n  \"vendor_name\": string | null,\n  \"invoice_date\": \"YYYY-MM-DD\" | null,\n  \"total\": number | null,\n  \"currency\": \"USD\" | \"EUR\" | \"GBP\" | null\n}\n\n# Examples\nInput: \"Invoice #INV-001 from Acme Corp dated Jan 15, 2024. Total: $1,250.00\"\nOutput: {\"invoice_number\": \"INV-001\", \"vendor_name\": \"Acme Corp\",\n         \"invoice_date\": \"2024-01-15\", \"total\": 1250.00, \"currency\": \"USD\"}\n\nInput: \"Hello, how are you?\"\nOutput: {\"error\": \"not_an_invoice\"}\n\n# Edge Cases\n- Ambiguous dates: prefer ISO 8601\n- Ambiguous currency: return null rather than guess\n\"\"\"","examTip":"The exam asks you to identify what is MISSING from a system prompt. Most common gaps: no output format specified, no constraints on what NOT to do, no edge case handling, no examples. Role should be specific, not generic."},{"title":"Programmatic vs Prompt Control","content":"THE SINGLE MOST TESTED CONCEPT IN THE ENTIRE EXAM.\n\nTHE GOLDEN RULE:\nWhen a behavior is optional or preferred \u2014 use prompts.\nWhen a behavior is mandatory with zero tolerance for failure \u2014 use programmatic control.\n\nWHY THE DISTINCTION MATTERS:\nPrompts are probabilistic. Claude will 'usually' follow them but not always.\nFor preferences and style: acceptable.\nFor compliance rules, financial thresholds, safety requirements: unacceptable.\n\nPROGRAMMATIC CONTROL MECHANISMS:\n- Input validation before the request reaches Claude\n- JSON schema validation of Claude's outputs\n- Hooks that intercept tool calls before execution\n- Prerequisite gates that must pass before any action\n- Hard-coded thresholds that Claude cannot override\n\nTHE TEST:\nAsk yourself: 'What happens if Claude ignores this instruction 1% of the time?'\nIf the answer is 'bad outcome' (money lost, compliance violated) \u2014 make it programmatic.\nIf the answer is 'mildly suboptimal' \u2014 prompt-based is fine.","code":"# PROMPT-BASED \u2014 for preferences only\nSYSTEM = \"\"\"\nUse formal language in all responses.\nKeep responses under 500 words when possible.\nPrefer code examples over prose explanations.\n\"\"\"\n# These are stylistic preferences.\n# If Claude occasionally uses casual language, it is fine.\n# No financial/compliance/safety consequence.\n\n# PROGRAMMATIC \u2014 for compliance-critical requirements\ndef process_refund(user_id: str, refund_amount: float) -> dict:\n\n    # GATE 1: Identity \u2014 programmatic, cannot be bypassed by prompts\n    if not identity_service.verify(user_id):\n        return {\"status\": \"rejected\", \"reason\": \"identity_not_verified\"}\n\n    # GATE 2: Amount threshold \u2014 programmatic\n    if refund_amount > 10_000:\n        human_queue.submit({\"user\": user_id, \"amount\": refund_amount})\n        return {\"status\": \"pending\", \"reason\": \"requires_human_approval\"}\n\n    # GATE 3: Daily limit \u2014 programmatic\n    daily_total = refund_db.get_daily_total(user_id)\n    if daily_total + refund_amount > 50_000:\n        return {\"status\": \"rejected\", \"reason\": \"daily_limit_exceeded\"}\n\n    # All gates passed \u2014 NOW call Claude\n    return claude_agent.process_refund(user_id, refund_amount)\n\n# These gates CANNOT be bypassed by Claude.\n# Not by clever prompting. Not by adversarial inputs.\n# They are Python if-statements, not prompt instructions.","examTip":"The exam gives a scenario with a compliance/financial/safety requirement and 4 answer options. One will say 'add a system prompt instruction.' That answer is ALWAYS wrong. The correct answer uses hooks, validators, or programmatic gates. This rule applies across D1, D2, D3, and D4."},{"title":"Structured Output & Validation Retry Loop","content":"Getting Claude to return valid, schema-conforming JSON consistently requires multiple levels of enforcement.\n\nLEVEL 1 \u2014 Prompt instruction: 'Return JSON'\nWeakness: Claude may add prose, use wrong keys, or miss required fields.\n\nLEVEL 2 \u2014 Schema in prompt: Include the exact JSON structure.\nBetter, but Claude can still deviate on edge case inputs.\n\nLEVEL 3 \u2014 Validation plus retry loop:\nValidate output against schema. On failure, inject the specific error back as a user message and regenerate. Production grade.\n\nLEVEL 4 \u2014 Strict JSON mode via API.\nStrongest enforcement, lowest flexibility.\n\nTHE RETRY LOOP IS THE EXAM PATTERN:\n1. Call Claude with schema in system prompt\n2. Parse response as JSON\n3. Validate against schema\n4. If invalid: inject the specific error back, regenerate\n5. Repeat up to max_retries\n6. If still invalid: raise exception or route to human","code":"import json, jsonschema\n\nINVOICE_SCHEMA = {\n    \"type\": \"object\",\n    \"required\": [\"invoice_number\", \"vendor_name\", \"total\"],\n    \"properties\": {\n        \"invoice_number\": {\"type\": [\"string\", \"null\"]},\n        \"vendor_name\": {\"type\": [\"string\", \"null\"]},\n        \"total\": {\"type\": [\"number\", \"null\"]},\n        \"line_items\": {\n            \"type\": \"array\",\n            \"items\": {\n                \"type\": \"object\",\n                \"required\": [\"description\", \"unit_price\"],\n                \"properties\": {\n                    \"description\": {\"type\": \"string\"},\n                    \"unit_price\": {\"type\": \"number\"}\n                }\n            }\n        }\n    }\n}\n\nasync def extract_with_retry(text: str, max_retries: int = 3) -> dict:\n    conversation = [{\"role\": \"user\", \"content\": text}]\n    \n    for attempt in range(max_retries):\n        response = await client.messages.create(\n            model=\"claude-sonnet-4-5\",\n            system=SYSTEM_WITH_SCHEMA,\n            messages=conversation\n        )\n        raw = response.content[0].text\n        \n        # STEP 1: Parse JSON\n        try:\n            parsed = json.loads(raw)\n        except json.JSONDecodeError as e:\n            conversation += [\n                {\"role\": \"assistant\", \"content\": raw},\n                {\"role\": \"user\", \"content\":\n                 f\"JSON parse error: {e}. Return ONLY valid JSON, no prose.\"}\n            ]\n            continue\n        \n        # STEP 2: Validate schema\n        try:\n            jsonschema.validate(parsed, INVOICE_SCHEMA)\n            return parsed  # Valid\n        except jsonschema.ValidationError as e:\n            conversation += [\n                {\"role\": \"assistant\", \"content\": raw},\n                {\"role\": \"user\", \"content\":\n                 f\"Schema error: {e.message}. Fix and return corrected JSON.\"}\n            ]\n    \n    raise ExtractionFailed(f\"Failed after {max_retries} attempts\")","examTip":"The retry loop is tested in the Structured Data Extraction scenario. Know: parse errors and schema errors are SEPARATE checks. Always inject the SPECIFIC error back (not just 'try again'). Claude uses the error message to self-correct \u2014 vague feedback produces vague correction."},{"title":"Few-Shot Prompting","content":"Few-shot examples are among the highest-leverage prompt engineering techniques. You show Claude examples of desired input to output pairs, and it learns the pattern without fine-tuning.\n\nWHEN TO USE FEW-SHOT:\n- Output format is nuanced and hard to describe in words alone\n- You need consistent tone or style across many outputs\n- There are non-obvious rules that examples communicate better than prose\n- You need to prevent specific failure modes (negative examples)\n\nPOSITIVE EXAMPLES: Show the ideal case with clear, representative inputs.\nNEGATIVE EXAMPLES: Show what you do NOT want. Explicitly demonstrate the wrong approach and why it is wrong. Often more powerful than positive examples for preventing specific failure modes.\n\nEXAMPLE COUNT:\n- 2-3 examples: good baseline\n- 3-5: sweet spot for most tasks\n- 5-10: for complex tasks with many edge cases\n- More than 10: rarely adds value, wastes context window\n\nEXAMPLE SELECTION:\nCover edge cases, not just the obvious happy path.","code":"SYSTEM = \"\"\"\nClassify support tickets by urgency: CRITICAL, HIGH, MEDIUM, LOW.\nReturn JSON: {\"urgency\": \"LEVEL\", \"reason\": \"brief explanation\"}\n\n# POSITIVE EXAMPLES\n\nInput: \"Production API returning 500s for all users. Service is completely down.\"\nOutput: {\"urgency\": \"CRITICAL\", \"reason\": \"Production outage, all users affected\"}\n\nInput: \"Some reports showing wrong totals since yesterday's update.\"\nOutput: {\"urgency\": \"HIGH\", \"reason\": \"Data integrity issue, production affected\"}\n\nInput: \"Can you explain how the batch export feature works?\"\nOutput: {\"urgency\": \"LOW\", \"reason\": \"Feature question, no service impact\"}\n\n# NEGATIVE EXAMPLE \u2014 teaches Claude NOT to trust user-declared urgency\nInput: \"URGENT URGENT PLEASE HELP THIS IS CRITICAL\"\n# Wrong output: {\"urgency\": \"CRITICAL\", \"reason\": \"User says it's critical\"}\n# Correct output:\nOutput: {\"urgency\": \"MEDIUM\",\n         \"reason\": \"No service impact described. User-declared urgency\n                   alone does not indicate actual system criticality.\"}\n\n# The negative example prevents the most common mistake:\n# treating user-declared urgency as ground truth without evidence.\n\"\"\"","examTip":"Negative examples are underused but highly effective. Use them to prevent the specific failure mode most likely for your task. The exam tests whether you know to include negative examples \u2014 not just positive ones."},{"title":"Extended Thinking","content":"Extended thinking allows Claude to reason through complex problems step-by-step before giving its final response. The reasoning happens in a thinking block.\n\nWHEN TO USE:\n- Complex multi-step problems requiring careful logical reasoning\n- Multi-factor decisions (insurance claims, policy decisions, complex refunds)\n- Tasks where you want to inspect Claude's reasoning for debugging\n- Hard classification with many competing factors\n\nWHEN NOT TO USE:\n- Simple factual questions (wastes tokens and adds latency)\n- Latency-sensitive real-time user-facing applications\n- High-volume pipelines where cost matters more than depth\n\nCOST: Thinking tokens count toward your usage. Budget planning matters.\n\nLATENCY: Thinking significantly increases response time. Not suitable for customer-facing chatbots or any interaction requiring fast responses.","code":"import anthropic\nclient = anthropic.Anthropic()\n\n# Enable extended thinking for complex multi-factor decisions\nresponse = client.messages.create(\n    model=\"claude-sonnet-4-5\",\n    max_tokens=16000,\n    thinking={\n        \"type\": \"enabled\",\n        \"budget_tokens\": 8000  # Thinking budget \u2014 separate from output tokens\n    },\n    messages=[{\"role\": \"user\", \"content\": \"\"\"\n        Refund decision needed:\n        - Order placed: 45 days ago\n        - Delivered: 40 days ago\n        - Standard return policy: 30 days from delivery\n        - Customer reason: Product broke after 35 days of normal use\n        - Product category: Electronics\n        - Electronics defect policy: 90 days from delivery\n        - Customer tier: Premium (extended service applies)\n        \n        Should we approve, deny, or escalate this refund?\n    \"\"\"}]\n)\n\n# Process response \u2014 contains both thinking AND final answer\nfor block in response.content:\n    if block.type == \"thinking\":\n        # Claude's reasoning chain \u2014 use for debugging and audit trails\n        audit_log.save(block.thinking)\n    elif block.type == \"text\":\n        # Final answer only\n        decision = json.loads(block.text)\n\n# Token budget guidelines:\n# Simple classification: 0 (no thinking needed)\n# Standard reasoning: 2000-5000 tokens\n# Complex multi-factor: 5000-10000 tokens","examTip":"The exam tests when NOT to use extended thinking as much as when to use it. Wrong answer traps: 'use for all tasks' (too expensive) or 'use for customer-facing chatbot' (too slow). Correct: use for complex multi-factor decisions where reasoning quality justifies cost and latency."},{"title":"Message Batches API \u2014 50% Cost Savings","content":"The Message Batches API processes large volumes of requests asynchronously with a 50% cost reduction compared to synchronous calls. This is a distinct exam topic under Domain 4.\n\nWHEN TO USE BATCHES (very specific criteria):\n- The task is latency-tolerant (results can wait hours)\n- You have a large volume of independent requests (hundreds to thousands)\n- Cost reduction is important\n- Results do not need to flow into a live user interaction\n\nWHEN NOT TO USE BATCHES:\n- Real-time user-facing applications (unacceptable latency)\n- Tasks where step N needs step N-1's output (sequential dependency)\n- Small request volumes (overhead is not worth it)\n- When you need immediate results\n\nBATCH WINDOW: Up to 24 hours for processing. You poll for results or get a webhook.\nCOST: 50% reduction on input and output tokens.\nCAPACITY: Up to 10,000 requests per batch.\n\nEXAM DECISION RULE:\nQuestion asks about processing 5,000 documents overnight for a data pipeline? Batches.\nQuestion asks about answering a user's question in a chatbot? Synchronous API.","code":"import anthropic\nclient = anthropic.Anthropic()\n\n# Creating a batch \u2014 for 5,000 invoice extractions overnight\ninvoice_texts = load_invoices()  # 5,000 invoices\n\n# Build batch requests\nrequests = [\n    anthropic.types.message_create_params.Request(\n        custom_id=f\"invoice-{i}\",  # Your ID for matching results\n        params=anthropic.types.MessageCreateParamsNonStreaming(\n            model=\"claude-haiku-4-5\",  # Haiku + batch = maximum cost savings\n            max_tokens=500,\n            system=INVOICE_EXTRACTION_SYSTEM,\n            messages=[{\"role\": \"user\", \"content\": text}]\n        )\n    )\n    for i, text in enumerate(invoice_texts)\n]\n\n# Submit the batch \u2014 returns immediately, processing happens async\nbatch = client.messages.batches.create(requests=requests)\nprint(f\"Batch submitted: {batch.id}\")\nprint(f\"Status: {batch.processing_status}\")  # 'in_progress'\n\n# Poll for completion (or use webhook)\nimport time\nwhile True:\n    batch = client.messages.batches.retrieve(batch.id)\n    if batch.processing_status == \"ended\":\n        break\n    print(f\"Still processing... ({batch.request_counts.processing} remaining)\")\n    time.sleep(60)  # Check every minute\n\n# Retrieve results\nfor result in client.messages.batches.results(batch.id):\n    if result.result.type == \"succeeded\":\n        invoice_data = result.result.message.content[0].text\n        save_result(result.custom_id, invoice_data)\n    else:\n        log_failure(result.custom_id, result.result.error)","examTip":"Batches = 50% cost savings + async processing + 24h window + up to 10,000 requests. The exam tests when NOT to use them: real-time chatbots, sequential pipelines, small volumes. Use batches for: overnight data processing, bulk document analysis, large-scale extraction jobs. Never for live user interactions."},{"title":"Independent Review Instances","content":"One of the most specific exam traps under Domain 4: self-review within the same session produces biased, unreliable reviews.\n\nWHY SELF-REVIEW FAILS:\nWhen Claude generates output and then reviews it in the same conversation, the review is biased by the generation context. Claude has just produced that content and is psychologically anchored to it. The review will almost always confirm the original output rather than finding genuine flaws.\n\nTHE CORRECT PATTERN \u2014 Independent Review Instance:\nCreate a fresh Claude instance (new API call with no prior context) specifically for review. Give it only the artifact to review and the review criteria. It has no knowledge of how the artifact was generated and cannot be anchored to the original reasoning.\n\nMULTI-PASS REVIEW ARCHITECTURE:\nUse multiple independent reviewers for high-stakes outputs:\n1. Generation instance \u2014 produces the artifact\n2. Review instance 1 \u2014 checks correctness\n3. Review instance 2 \u2014 checks completeness\n4. Review instance 3 \u2014 adversarial check (finds failure modes)\n\nWHEN TO USE THIS:\n- Code review before deployment\n- Document validation before publishing\n- Any output where quality errors have significant consequences","code":"# WRONG \u2014 self-review in the same session\nasync def bad_review_pattern(task: str) -> str:\n    messages = [{\"role\": \"user\", \"content\": task}]\n    \n    # Generate\n    response = await client.messages.create(messages=messages)\n    draft = response.content[0].text\n    \n    # BAD: reviewing in the same conversation context\n    messages.append({\"role\": \"assistant\", \"content\": draft})\n    messages.append({\"role\": \"user\", \"content\": \"Review your response above.\"})\n    review = await client.messages.create(messages=messages)\n    # Claude is anchored to its own draft \u2014 this review is unreliable\n\n# CORRECT \u2014 independent review instance\nasync def independent_review_pattern(task: str) -> str:\n    # INSTANCE 1: Generate\n    generation = await client.messages.create(\n        model=\"claude-sonnet-4-5\",\n        messages=[{\"role\": \"user\", \"content\": task}]\n    )\n    draft = generation.content[0].text\n    \n    # INSTANCE 2: Fresh context \u2014 no knowledge of generation process\n    review = await client.messages.create(\n        model=\"claude-sonnet-4-5\",\n        system=\"You are a critical reviewer. Find errors, gaps, and improvements.\",\n        messages=[{\n            \"role\": \"user\",\n            \"content\": f\"Review this output for correctness and completeness:\\n\\n{draft}\"\n        }]\n        # No generation history \u2014 unbiased review\n    )\n    \n    # INSTANCE 3: If needed, adversarial check\n    adversarial = await client.messages.create(\n        model=\"claude-sonnet-4-5\",\n        system=\"Find all ways this could fail in production. Be adversarial.\",\n        messages=[{\"role\": \"user\", \"content\": draft}]\n    )\n    \n    return synthesize(draft, review, adversarial)","examTip":"EXAM TRAP: 'Ask Claude to review its own response in the same session.' This is always the wrong answer. The correct pattern is always an independent review instance \u2014 a fresh API call with no prior conversation history. Memorize: same-session self-review = anchoring bias = unreliable."},{"title":"tool_use for Structured Output","content":"Beyond asking Claude to return JSON as text, there is a more reliable method: define your schema as a tool and force Claude to call it via tool_choice.\n\nWHY THIS IS MORE RELIABLE THAN TEXT JSON:\nWhen you ask Claude to return JSON as text, it generates text that looks like JSON. It can add prose before or after. It can deviate from your schema. You must parse and validate with a retry loop.\n\nWhen you define your schema as a tool and set tool_choice to force exactly that tool, the API GUARANTEES the output matches the schema. Claude cannot add prose. It cannot skip required fields. No retry loop needed.\n\nTHE PATTERN:\n1. Define your desired output schema as a tool's input_schema\n2. Set tool_choice = {type: tool, name: your_tool_name}\n3. Extract block.input from the response\n4. The API has already enforced schema compliance\n\nWHEN TO USE tool_use:\n- Complex schemas with many required fields\n- When you need 100% structure guarantee for compliance or downstream systems\n- When you want to eliminate the parse-and-validate retry loop\n- Production extraction pipelines\n\nWHEN TEXT JSON IS FINE:\n- Simple schemas with 2-3 fields\n- When you already have a validation retry loop\n- Prototyping and development","code":"import anthropic\nclient = anthropic.Anthropic()\n\n# Define your desired output structure as a TOOL\nINVOICE_SCHEMA_TOOL = {\n    'name': 'extract_invoice',\n    'description': 'Extract structured invoice data from the provided text',\n    'input_schema': {\n        'type': 'object',\n        'required': ['invoice_number', 'vendor_name', 'total'],\n        'properties': {\n            'invoice_number': {'type': ['string', 'null']},\n            'vendor_name': {'type': ['string', 'null']},\n            'invoice_date': {'type': ['string', 'null'],\n                             'description': 'YYYY-MM-DD format or null'},\n            'total': {'type': ['number', 'null']},\n            'currency': {\n                'type': 'string',\n                'enum': ['USD', 'EUR', 'GBP', 'UNKNOWN'],\n                'default': 'UNKNOWN'\n            }\n        }\n    }\n}\n\ndef extract_invoice(text: str) -> dict:\n    response = client.messages.create(\n        model='claude-sonnet-4-5',\n        max_tokens=1024,\n        tools=[INVOICE_SCHEMA_TOOL],\n        tool_choice={'type': 'tool', 'name': 'extract_invoice'},  # FORCE this tool\n        messages=[{'role': 'user', 'content': text}]\n    )\n    # API guarantees stop_reason == tool_use\n    for block in response.content:\n        if block.type == 'tool_use' and block.name == 'extract_invoice':\n            return block.input  # Already schema-validated by the API\n\n# COMPARISON:\n# Text JSON:   Claude writes text -> parse -> validate -> retry loop needed\n# tool_use:    API enforces schema -> extract block.input -> done\n# No retry loop needed -- impossible to get invalid structure with tool_use","examTip":"tool_use for structured output = schema as tool definition + tool_choice force = API-guaranteed schema compliance. The exam contrasts this with text-based JSON parsing. Key advantage: no retry loop needed because the API enforces the schema at generation time. Use tool_use for complex production schemas. Use text JSON for simple prototypes."}]},{"id":5,"weight":15,"color":"#b03ae0","name":"Context Management & Reliability","tagline":"Keep Claude coherent across long tasks. Design for graceful failure.","icon":"\ud83e\udde0","sections":[{"title":"Understanding the Context Window","content":"The context window is everything Claude can see at once. Every byte of text \u2014 system prompt, conversation history, tool results, documents, Claude's own outputs \u2014 competes for this finite space.\n\nCONTEXT WINDOW ANATOMY (in order of typical size):\n1. System prompt \u2014 fixed per deployment (500-2000 tokens)\n2. Documents or data you inject \u2014 variable, often large\n3. Conversation history \u2014 grows with each turn\n4. Tool call inputs \u2014 usually small\n5. Tool results \u2014 often the BIGGEST wildcard (DB query results, API responses)\n6. Claude's output \u2014 also counts toward the limit\n\nCURRENT LIMITS:\n- Claude Sonnet 4.5: 200,000 token context window\n- Rule of thumb: 1,000 tokens = approximately 750 words\n\nWHY THIS MATTERS FOR MULTI-AGENT SYSTEMS:\nIn long-running agentic workflows, the context window fills up. If you do not manage it, you will hit the limit mid-task and get crashed or degraded responses.\n\nContext management is not optional in production agents \u2014 it is a required architectural concern.","code":"import anthropic\nclient = anthropic.Anthropic()\n\n# Check token count BEFORE making an expensive call\ndef estimate_tokens(messages: list, system: str = \"\") -> int:\n    response = client.messages.count_tokens(\n        model=\"claude-sonnet-4-5\",\n        system=system,\n        messages=messages\n    )\n    return response.input_tokens\n\n# Token budget planning for a 5-step pipeline\nTOTAL_WINDOW = 200_000       # Claude Sonnet 4.5\nSYSTEM_TOKENS = 1_500        # Fixed cost\nSAFETY_HEADROOM = 10_000     # Never use 100%\nAVAILABLE = 188_500          # What is left for work\n\nNUM_STEPS = 5\nPER_STEP = AVAILABLE // NUM_STEPS  # ~37,700 per step\n\n# Per step budget allocation:\nSTEP_BUDGET = {\n    \"conversation_history\": int(PER_STEP * 0.30),  # ~11,310\n    \"task_context\":         int(PER_STEP * 0.40),  # ~15,080\n    \"tool_results\":         int(PER_STEP * 0.20),  # ~7,540\n    \"output_headroom\":      int(PER_STEP * 0.10),  # ~3,770\n}\n\ndef is_near_limit(messages, system, budget: int) -> bool:\n    tokens = estimate_tokens(messages, system)\n    return tokens > budget * 0.9  # 90% = trigger compression","examTip":"Context window budgeting appears in the Multi-Agent Research scenario. Know: check token count before calls, leave safety headroom (~10%), tool results are the biggest wildcard and must be truncated or summarized aggressively when context is tight."},{"title":"Agent Handoff Patterns","content":"When one agent finishes and another picks up, you need to transfer state WITHOUT passing the entire conversation history.\n\nTHE PROBLEM:\nAgent A ran a 50,000-token research conversation. Agent B needs to continue the work. Passing the full 50k context is wasteful, potentially hitting context limits, and degrades B's reasoning with irrelevant information.\n\nTHE SOLUTION: Structured handoff summaries.\nAgent A produces a compact, structured summary. Agent B starts with just this summary \u2014 not the full history.\n\nHANDOFF SUMMARY SHOULD INCLUDE:\n- What was accomplished in this phase (briefly)\n- Key findings as structured data, not prose transcripts\n- What the next agent needs to do (the specific task)\n- Constraints the next agent must respect\n- Artifacts: files and data by reference, not full content\n\nThe handoff object is your API between agents. Design it like any good API: minimal, typed, explicit.","code":"from dataclasses import dataclass\nfrom typing import Any\n\n@dataclass\nclass AgentHandoff:\n    phase_completed: str\n    key_findings: list        # Structured data, not raw transcripts\n    next_task: str            # Clear, specific task for next agent\n    constraints: list         # Rules the next agent must follow\n    artifacts: dict           # References to data, not full content\n\nasync def research_pipeline(query: str) -> str:\n    # Phase 1: Search agent runs\n    search_result = await search_agent.run(query)\n    \n    # Build compact handoff \u2014 NOT the search conversation\n    handoff_1 = AgentHandoff(\n        phase_completed=\"web_search\",\n        key_findings=[\n            # Top 5 sources only, brief summaries\n            {\"url\": r.url, \"relevance\": r.score, \"summary\": r.summary[:200]}\n            for r in search_result.results[:5]\n        ],\n        next_task=\"Synthesize findings into a 500-word research report\",\n        constraints=[\"Cite all sources\", \"Neutral tone\"],\n        artifacts={\"source_count\": len(search_result.results)}\n        # NOT passing the full source list\n    )\n    \n    # Phase 2: Synthesis agent gets ONLY the handoff\n    synthesis = await synthesis_agent.run(\n        task=handoff_1.next_task,\n        context=handoff_1  # ~500 tokens, not 50,000\n    )\n    \n    return synthesis.text","examTip":"Exam trap: passing full conversation history between agents. Correct: create structured handoff summaries that are as SMALL as possible while preserving all necessary state. The handoff is your inter-agent API \u2014 design it with the same discipline as any production API."},{"title":"Memory Patterns","content":"For long-running agents or multi-session workflows, you need memory that persists beyond the context window.\n\nIN-CONTEXT MEMORY:\nEverything lives in conversation history.\nPros: no external system, simple.\nCons: limited by context window, lost when session ends.\nUse for: short single-session tasks.\n\nEXTERNAL KEY-VALUE MEMORY:\nAgent reads and writes to a database or cache (Redis, PostgreSQL).\nPros: persistent across sessions, unlimited capacity, fast lookup.\nCons: requires external system, must manage schema.\nUse for: user preferences, entity state, session continuity.\n\nVECTOR OR SEMANTIC MEMORY:\nEmbeddings stored in a vector database (pgvector, Pinecone, Weaviate).\nPros: retrieves by semantic similarity, very large capacity.\nCons: requires embedding model plus vector DB, more complex.\nUse for: large knowledge bases, document retrieval, long-term knowledge stores.\n\nEXAM RULE:\nShort single-session = in-context.\nMulti-session user state = key-value.\nLarge knowledge retrieval = vector.","code":"import redis, json\n\nmemory = redis.Redis(host='redis-service', port=6379)\n\nclass PersistentAgent:\n    def __init__(self, session_id: str):\n        self.key = f\"agent:memory:{session_id}\"\n    \n    def load(self) -> dict:\n        data = memory.get(self.key)\n        return json.loads(data) if data else {\n            \"user_preferences\": {},\n            \"completed_tasks\": [],\n            \"conversation_summary\": \"\"\n        }\n    \n    def save(self, state: dict):\n        memory.setex(self.key, 86400, json.dumps(state))  # 24h TTL\n    \n    async def run(self, user_message: str) -> str:\n        state = self.load()\n        \n        # Inject RELEVANT memory only \u2014 not the entire state\n        relevant = {\n            \"user_prefs\": state[\"user_preferences\"],\n            \"recent_tasks\": state[\"completed_tasks\"][-3:],  # Last 3 only\n            \"prior_context\": state[\"conversation_summary\"]\n        }\n        \n        response = client.messages.create(\n            model=\"claude-sonnet-4-5\",\n            system=f\"Context from prior sessions: {json.dumps(relevant)}\",\n            messages=[{\"role\": \"user\", \"content\": user_message}]\n        )\n        \n        state[\"completed_tasks\"].append(user_message[:100])\n        self.save(state)\n        \n        return response.content[0].text","examTip":"The exam gives scenarios and asks which memory pattern. 'User interacts across multiple sessions' = key-value. 'Agent needs to search 10,000 internal documents' = vector. 'Single task, one session, no persistence needed' = in-context. Know the pattern to use case mapping cold."},{"title":"Graceful Degradation","content":"Production agents must handle resource constraints and failure gracefully.\n\nWHEN CONTEXT APPROACHES THE LIMIT:\nOption 1 \u2014 SUMMARIZE AND COMPRESS: Convert verbose history into a compact summary. Keep recent messages in full, summarize older ones.\nOption 2 \u2014 PRIORITIZE AND TRUNCATE: Keep most recent and relevant context, drop older or less relevant items. Tool results are easiest to truncate.\nOption 3 \u2014 HUMAN ESCALATION: If the task genuinely requires more context than fits, pause and request human input.\n\nWHEN THE AGENT IS STUCK IN A LOOP:\n1. DETECT: Track tool calls. Same tool with same inputs N times = stuck.\n2. CHANGE STRATEGY: Ask Claude to try a different approach.\n3. REDUCE SCOPE: Break the sub-task into smaller pieces.\n4. ESCALATE: After N attempts, surface to human with status report.\n\nWHEN TO ABSTAIN vs GUESS:\nHigh stakes plus low confidence = abstain and escalate.\nLow stakes plus low confidence = answer with explicit uncertainty flag.\nAny stakes plus high confidence = answer normally.","code":"class ContextManager:\n    def __init__(self, max_tokens=180_000):\n        self.max_tokens = max_tokens\n        self.warn_at = 0.80   # 80% = start compressing\n        self.stop_at = 0.95   # 95% = cannot safely continue\n    \n    async def maybe_compress(self, messages: list, current_tokens: int) -> list:\n        ratio = current_tokens / self.max_tokens\n        \n        if ratio < self.warn_at:\n            return messages  # Fine \u2014 no action needed\n        \n        elif ratio < self.stop_at:\n            # Summarize older messages, keep recent ones in full\n            old_messages = messages[:-8]\n            recent = messages[-8:]\n            summary = await self._summarize(old_messages)\n            return [\n                {\"role\": \"user\", \"content\": f\"[History summary]: {summary}\"},\n                {\"role\": \"assistant\", \"content\": \"Understood, continuing.\"},\n                *recent\n            ]\n        \n        else:\n            raise ContextLimitError(\"Context limit reached. Task must be split.\")\n\nclass LoopDetector:\n    def __init__(self, max_repeats=3):\n        self.history = []\n        self.max = max_repeats\n    \n    def is_stuck(self, tool: str, inputs: dict) -> bool:\n        sig = f\"{tool}:{sorted(inputs.items())}\"\n        recent = self.history[-self.max:]\n        stuck = len(recent) == self.max and all(s == sig for s in recent)\n        self.history.append(sig)\n        return stuck","examTip":"Graceful degradation is tested across multiple scenarios. The 3 options when context fills: compress and summarize, truncate and prioritize, or escalate to human. Truncating tool results first is usually correct \u2014 they are often the biggest and most compressible part of the context."},{"title":"Confidence Calibration","content":"Claude should not present uncertain outputs as confident ones. Downstream systems that receive a confident-sounding wrong answer will make bad decisions.\n\nWHY THIS IS AN ARCHITECTURAL CONCERN:\nConfidence calibration is not just about prompting Claude to 'say when you're unsure.' It is about building systems that structurally capture uncertainty and route accordingly.\n\nCALIBRATION STRATEGIES:\n1. Explicit confidence fields in structured output: include a score alongside every extracted value.\n2. Confidence-based routing: route low-confidence outputs to human review automatically.\n3. Invite uncertainty in system prompts: 'If you are not confident, say so clearly.'\n4. Separate the extraction from the assessment: Claude extracts, then Claude self-assesses.\n\nTHE CUSTOMER SUPPORT SCENARIO:\nWhen should the agent handle autonomously vs escalate?\nHigh stakes plus low confidence = escalate always.\nLow stakes plus low confidence = answer with uncertainty flag.\nCRITICAL urgency = immediate human escalation regardless of confidence.","code":"# Confidence-aware structured output\nSYSTEM = \"\"\"\nExtract the requested fields with confidence scores.\n\nFor each field include:\n- value: the extracted value or null\n- confidence: float 0.0 to 1.0\n- basis: why you are confident or not\n\nReturn JSON:\n{\n  \"fields\": {\n    \"field_name\": {\n      \"value\": any,\n      \"confidence\": float,\n      \"basis\": string\n    }\n  }\n}\n\"\"\"\n\n# Confidence-based routing in production\nasync def extract_and_route(document: str) -> dict:\n    result = await claude_extract(document)\n    fields = result[\"fields\"]\n    \n    low_confidence = [\n        name for name, data in fields.items()\n        if data[\"confidence\"] < 0.7\n    ]\n    \n    # High stakes: any low confidence = escalate\n    if is_high_stakes(document) and low_confidence:\n        return await human_review.submit({\n            \"doc\": document, \"partial\": result,\n            \"uncertain_fields\": low_confidence\n        })\n    \n    # Low stakes: many uncertain fields = flag but proceed\n    if len(low_confidence) > 3:\n        result[\"requires_verification\"] = low_confidence\n        return result\n    \n    # High confidence: proceed automatically\n    return result\n\n# Customer support routing\nasync def route_ticket(ticket: str) -> dict:\n    classification = await classify_ticket(ticket)\n    \n    if classification[\"urgency\"] == \"CRITICAL\":\n        return await immediate_human_escalation(ticket)\n    elif classification[\"confidence\"] < 0.75:\n        return await human_review_queue.submit(ticket)\n    else:\n        return await automated_handler(ticket, classification)","examTip":"This concept ties together D1 (when to escalate), D4 (structured output with confidence), and D5 (reliability). The Customer Support scenario specifically tests: under what conditions should the agent escalate? Answer: low confidence on high-stakes queries, OR any CRITICAL urgency regardless of confidence."},{"title":"Information Provenance","content":"Information provenance means tracking where data came from as it flows through a multi-agent pipeline. This becomes critical when agents combine, transform, or summarize information from multiple sources.\n\nWHY PROVENANCE MATTERS:\nIn a multi-agent research system, Agent A retrieves from Source X, Agent B retrieves from Source Y, Agent C synthesizes both. If the final output contains an error, which source is wrong? Without provenance tracking you cannot debug, audit, or correct the pipeline.\n\nPROVENANCE FIELDS TO TRACK:\n- source_id: unique identifier for the original data source\n- retrieved_at: timestamp of retrieval\n- agent_id: which agent processed this piece of information\n- transformations: what operations were applied (summarized, translated, merged)\n- confidence: confidence score at each transformation step\n\nPROVENANCE PATTERNS:\n1. PASS-THROUGH: Each agent attaches its provenance metadata before passing data forward\n2. LINEAGE GRAPH: A separate tracking system records every transformation as a directed graph\n3. IMMUTABLE CHAIN: Each transformation creates a new record with a pointer to the previous\n\nWHEN THE EXAM TESTS THIS:\nScenario: 'A multi-agent pipeline produces an incorrect report. How do you identify which agent introduced the error?' Answer: information provenance tracking at each step.","code":"from dataclasses import dataclass, field\nfrom datetime import datetime\nfrom typing import Any\n\n@dataclass\nclass ProvenanceRecord:\n    source_id: str\n    content: Any\n    retrieved_at: str = field(default_factory=lambda: datetime.utcnow().isoformat())\n    agent_id: str = \"\"\n    transformations: list = field(default_factory=list)\n    confidence: float = 1.0\n\n# Each agent attaches provenance before passing data forward\nasync def search_agent(query: str) -> list[ProvenanceRecord]:\n    raw_results = await web_search(query)\n    return [\n        ProvenanceRecord(\n            source_id=r.url,\n            content=r.text,\n            agent_id=\"search_agent_v1\",\n            transformations=[],\n            confidence=r.relevance_score\n        )\n        for r in raw_results\n    ]\n\nasync def summarize_agent(records: list[ProvenanceRecord]) -> list[ProvenanceRecord]:\n    summarized = []\n    for record in records:\n        summary = await claude_summarize(record.content)\n        summarized.append(ProvenanceRecord(\n            source_id=record.source_id,   # PRESERVE original source\n            content=summary,\n            agent_id=\"summarize_agent_v1\",\n            transformations=record.transformations + [\"summarized\"],  # Add step\n            confidence=record.confidence * 0.95  # Slight confidence decay\n        ))\n    return summarized\n\n# When an error is found in final output:\ndef trace_error(error_content: str, records: list[ProvenanceRecord]):\n    matching = [r for r in records if error_content in str(r.content)]\n    for record in matching:\n        print(f\"Source: {record.source_id}\")\n        print(f\"Agent chain: {record.agent_id}\")\n        print(f\"Transformations: {record.transformations}\")\n        print(f\"Confidence: {record.confidence}\")","examTip":"Information provenance appears in the Multi-Agent Research scenario. The exam question is: 'How do you identify which stage of the pipeline introduced an error?' Answer: provenance tracking attached to each data record. Key fields: source_id (original source), agent_id (who processed it), transformations (what was done to it)."},{"title":"Out-of-Scope Topics \u2014 What NOT to Study","content":"The official exam guide includes an explicit out-of-scope list. Studying these topics wastes time that should go to the 5 domains.\n\nOFFICIALLY OUT OF SCOPE:\n- Fine-tuning or training Claude models\n- Authentication and authorization systems (OAuth, SSO, etc.)\n- Vision and image processing capabilities\n- Streaming API implementation details\n- Embeddings and vector database implementation\n- Cost optimization beyond model selection\n- Anthropic's safety research and Constitutional AI internals\n- Deployment infrastructure beyond what affects Claude behavior\n\nWHAT THIS MEANS IN PRACTICE:\nIf an exam question seems to ask about implementing OAuth \u2014 it is actually asking about something else (maybe RBAC at the Claude level). Re-read it.\nIf a question asks about vision \u2014 it is likely testing when to use vs not use multi-modal inputs.\n\nPASSING SCORE CORRECTION:\nThe correct passing score is 720/1000 \u2014 NOT 850/1000 as some guides incorrectly state. Some sources report 850 as a target for confidence before taking the exam, but the actual passing threshold set by Anthropic is 720.\n\nEXAM LOGISTICS:\n- 60 questions, 120 minutes (2 minutes per question)\n- Proctored via ProctorFree\n- $99 per attempt (first 5,000 Partner Network employees: free)\n- Results available immediately after submission","code":"# Quick reference: in-scope vs out-of-scope\n\n# IN SCOPE \u2014 study these\nIN_SCOPE = [\n    \"Agentic loop patterns (stop_reason, tool_use, max_iterations)\",\n    \"Hub-and-spoke multi-agent orchestration\",\n    \"Lifecycle hooks (before_tool_call, after_tool_call)\",\n    \"MCP primitives (tools, resources, prompts)\",\n    \"MCP configuration (.mcp.json, stdio vs SSE)\",\n    \"CLAUDE.md hierarchy (global, project, local)\",\n    \"Claude Code hooks (PreToolUse, PostToolUse exit codes)\",\n    \"Headless mode and CI/CD integration\",\n    \"Programmatic vs prompt-based enforcement\",\n    \"JSON schema validation and retry loops\",\n    \"Few-shot prompting (positive + negative examples)\",\n    \"Extended thinking (when to use and when NOT to)\",\n    \"Message Batches API (50% savings, 24h window)\",\n    \"Independent review instances\",\n    \"Context window budgeting\",\n    \"Agent handoff patterns\",\n    \"Memory patterns (in-context, key-value, vector)\",\n    \"Graceful degradation\",\n    \"Confidence calibration and routing\",\n    \"Information provenance tracking\"\n]\n\n# OUT OF SCOPE \u2014 do not study\nOUT_OF_SCOPE = [\n    \"Fine-tuning or training models\",\n    \"OAuth, SSO, authentication systems\",\n    \"Embeddings and vector DB implementation\",\n    \"Streaming API implementation details\",\n    \"Constitutional AI internals\",\n    \"Deployment infrastructure (Kubernetes, networking)\",\n    \"Vision/image processing details\"\n]\n\n# PASSING SCORE\nPASSING_SCORE = 720   # out of 1000 \u2014 NOT 850\nTIME_LIMIT = 120      # minutes\nQUESTIONS = 60","examTip":"The out-of-scope list saves you from studying the wrong things. IMPORTANT CORRECTION: The passing score is 720/1000 \u2014 not 850. Some study materials incorrectly state 850 as the passing bar (that is a recommended practice score target, not the actual threshold). The official Anthropic passing score is 720."},{"title":"Lost in the Middle Effect","content":"The lost in the middle effect is a real LLM reliability constraint that the exam tests as an architectural design concern.\n\nWHAT IT IS:\nWhen Claude receives very long input, it reliably processes content at the BEGINNING and END with high accuracy. Content in the MIDDLE of long inputs tends to be underweighted or missed.\n\nIMPACT ON MULTI-AGENT SYSTEMS:\nIf your coordinator passes 20 source documents as a flat list to a synthesis agent, the middle 10-15 documents will be underrepresented. Documents 1-3 and 18-20 will dominate the synthesis.\n\nDESIGN PATTERNS TO COUNTER IT:\n1. KEY-FIRST ORDERING: Put most important content at the beginning\n2. EXPLICIT SECTION HEADERS: Use clear headers to help navigation\n3. SUMMARY AT TOP: Brief summary before the full content\n4. CHUNKING: Break large inputs into smaller focused calls (groups of 5, not 20)\n5. TRIM VERBOSE OUTPUTS: Remove boilerplate from tool results before passing\n\nEXAM QUESTION PATTERN:\n'A synthesis agent consistently misses information from some sources in a 20-source pipeline. Most likely cause?' Answer: lost in the middle effect.\nFix options: reorder (most important first), add headers, or chunk into smaller calls.","code":"# WRONG -- flat list, middle content underweighted\ndef bad_synthesis_prompt(sources: list) -> str:\n    # Sources 1-3 and 18-20 will dominate\n    # Sources 4-17 are 'lost in the middle'\n    text = '\\n---\\n'.join(f'Source {i+1}: {s[\"content\"]}' for i, s in enumerate(sources))\n    return f'Synthesize these 20 sources:\\n{text}'\n\n# CORRECT -- key-first ordering, headers, trimmed\ndef good_synthesis_prompt(sources: list, primary_indices: list) -> str:\n    # Reorder: most important sources FIRST\n    ordered = (\n        [sources[i] for i in primary_indices] +\n        [s for i, s in enumerate(sources) if i not in primary_indices]\n    )\n    # Trim to key info only\n    trimmed = [\n        {'title': s['title'], 'summary': s['content'][:300], 'score': s['score']}\n        for s in ordered\n    ]\n    return f\"\"\"SYNTHESIS TASK: {query}\n\nHIGHEST PRIORITY SOURCES (weight these heavily):\n{format_sources(trimmed[:3])}\n\nSUPPORTING SOURCES:\n{format_sources(trimmed[3:])}\n\"\"\"\n\n# CHUNKING: groups of 5 instead of 20 at once\nasync def chunked_synthesis(sources: list, query: str) -> str:\n    chunks = [sources[i:i+5] for i in range(0, len(sources), 5)]\n    # Each chunk: only 5 sources, no middle-loss problem\n    partials = [await synthesize_chunk(chunk, query) for chunk in chunks]\n    # Final synthesis of the shorter partial results\n    return await synthesize_final(partials, query)","examTip":"Lost in the middle is a D5 reliability question. Scenario: 'Synthesis agent misses info from middle sources in a 20-doc pipeline. Cause?' Answer: lost in the middle effect. Three fixes to know: key-first ordering, explicit section headers, and chunked synthesis (groups of 5 instead of 20 at once)."},{"title":"Verbose Tool Output Trimming & Scratchpad Persistence","content":"Two context management techniques explicitly listed in the official CCA exam guide preparation exercises.\n\nVERBOSE TOOL OUTPUT TRIMMING:\nTool results are the biggest source of context bloat in production agents. A database query can return 10,000 rows. An API response can return deeply nested JSON with hundreds of fields you will never use. Passing the full result wastes tokens and hits context limits mid-pipeline.\n\nTRIMMING STRATEGIES:\n- Extract only the fields you need from structured results\n- Cap row counts (50 rows max, not 10,000)\n- Truncate long string values to a maximum length\n- Summarize large result sets instead of passing all rows\n- Replace boilerplate sections with a [TRUNCATED] marker\n\nSCRATCHPAD PERSISTENCE:\nA scratchpad is where Claude writes intermediate working notes during a long task. Unlike the full context, you selectively preserve the scratchpad across steps by injecting it at the beginning of each subsequent call.\n\nWHY SCRATCHPAD:\nIn long multi-step workflows, important intermediate conclusions get buried as more content accumulates. Scratchpad explicitly preserves what Claude needs for final synthesis. Injecting at the START of context exploits key-first placement and avoids lost-in-middle.\n\nEXAM EXERCISE:\nThe official CCA prep exercises specifically mention: 'managing context windows through scratchpad persistence, verbose tool output trimming, and subagent delegation boundaries.'","code":"import json\n\n# VERBOSE TOOL OUTPUT TRIMMING\n\n# BAD -- pass entire database result\ndef bad_handler(result: list) -> str:\n    return json.dumps(result)  # 10,000 rows x 50 fields -- never do this\n\n# GOOD -- trim to what Claude actually needs\ndef trim_result(result: list, fields: list,\n                max_rows: int = 50, max_str: int = 200) -> str:\n    trimmed = []\n    for row in result[:max_rows]:          # Cap row count\n        r = {}\n        for f in fields:                   # Only needed fields\n            v = row.get(f)\n            if isinstance(v, str) and len(v) > max_str:\n                v = v[:max_str] + '...[truncated]'\n            r[f] = v\n        trimmed.append(r)\n    out = json.dumps(trimmed)\n    if len(result) > max_rows:\n        out += f'\\n[Showing {max_rows} of {len(result)} total rows]'\n    return out\n\n# SCRATCHPAD PERSISTENCE\n\nclass AgentWithScratchpad:\n    def __init__(self): self.scratchpad = ''\n\n    async def run_step(self, task: str, tool_results: str) -> str:\n        # Inject scratchpad at START of context\n        # Key-first placement: avoids lost-in-middle\n        system = (\n            f'WORKING NOTES FROM PREVIOUS STEPS:\\n{self.scratchpad}\\n\\n'\n            if self.scratchpad else ''\n        ) + 'You are a research synthesis agent.'\n\n        response = await client.messages.create(\n            model='claude-sonnet-4-5', system=system,\n            messages=[{'role': 'user',\n                       'content': f'Task: {task}\\n\\nNew data:\\n{tool_results}'}]\n        )\n        text = response.content[0].text\n        # Extract notes Claude marked for preservation\n        if '[SCRATCHPAD]' in text:\n            self.scratchpad = extract_between(text, '[SCRATCHPAD]', '[/SCRATCHPAD]')\n        return text","examTip":"Both techniques appear in the official prep exercise list. Trimming: extract only needed fields, cap rows at 50, truncate strings, summarize large sets. Scratchpad: preserve Claude's intermediate notes by injecting them at the START of subsequent calls (key-first placement avoids lost-in-middle). Exam scenario: 'Agent hits context limit mid-pipeline. First optimization?' Answer: trim verbose tool outputs."}]}]
</script>
<style>
:root{
  --bg:#0c0c0e;--bg2:#131316;--bg3:#1a1a1f;--border:#26262e;
  --text:#e2ddd6;--muted:#6b6875;--faint:#2a2a32;
  --d1:#e05c3a;--d2:#3aace0;--d3:#3ae07a;--d4:#e0b83a;--d5:#b03ae0;

}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Georgia,serif}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh}

/* ── TOPNAV ── */
#topnav{
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;flex-shrink:0;
  height:52px;padding:0;
}
#logo{
  background:#111;border-right:1px solid var(--border);
  padding:0 18px;height:100%;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.logo-badge{background:var(--yellow);color:#000;font-size:10px;font-weight:700;padding:3px 8px;border-radius:2px;font-family:monospace;letter-spacing:2px}
.logo-text{color:var(--muted);font-size:10px;font-family:monospace;letter-spacing:1px}
#breadcrumb{
  flex:1;display:flex;align-items:center;gap:6px;
  padding:0 20px;font-size:12px;font-family:monospace;color:var(--muted);
  overflow:hidden;white-space:nowrap;
}
.bc-sep{color:var(--border)}
.bc-link{color:var(--muted);transition:color .15s}
.bc-link:hover{color:var(--text)}
.bc-current{color:var(--text)}
#prog-wrap{padding:0 20px;display:flex;align-items:center;gap:10px;border-left:1px solid var(--border);height:100%;flex-shrink:0}
#prog-bar{background:var(--faint);height:4px;width:80px;border-radius:2px}
#prog-fill{height:100%;border-radius:2px;background:var(--green);width:0;transition:width .4s}
#prog-label{font-size:10px;color:var(--muted);font-family:monospace;white-space:nowrap}

/* ── DOMAIN TABS ── */
#domain-tabs{
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;flex-shrink:0;
}
#domain-tabs::-webkit-scrollbar{height:0}
.dtab{
  background:transparent;border:none;border-bottom:3px solid transparent;
  padding:10px 20px;display:flex;flex-direction:column;gap:3px;
  min-width:148px;flex-shrink:0;text-align:left;
  transition:background .15s;
}
.dtab:hover{background:var(--faint)}
.dtab.active{background:var(--bg3)}
.dtab-top{display:flex;align-items:center;gap:6px}
.dtab-weight{font-size:11px;font-family:monospace;font-weight:700}
.dtab-name{font-size:11px;color:var(--muted)}
.dtab.active .dtab-name{color:var(--text)}
.dtab-stat{font-size:9px;color:var(--border);font-family:monospace}

/* ── BODY ── */
#body{display:flex;flex:1;min-height:0}

/* ── SIDEBAR ── */
#sidebar{
  width:272px;flex-shrink:0;border-right:1px solid var(--border);
  background:var(--bg2);display:flex;flex-direction:column;overflow:hidden;
}
#sidebar-head{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
#sb-domain-label{font-size:9px;color:var(--muted);font-family:monospace;letter-spacing:2px;margin-bottom:4px}
#sb-domain-name{font-size:13px;color:var(--text)}
#sb-tagline{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}
#sb-pill{display:inline-block;margin-top:10px;border-radius:20px;padding:3px 12px;font-size:10px;font-weight:700}
#section-list{overflow-y:auto;flex:1;padding:6px 0}
#section-list::-webkit-scrollbar{width:4px}
#section-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sitem{
  width:100%;background:none;border:none;border-left:3px solid transparent;
  padding:10px 14px;text-align:left;display:flex;gap:10px;align-items:flex-start;
  transition:background .1s;
}
.sitem:hover{background:var(--faint)}
.sitem.active{border-left-color:var(--d-color,#888);background:var(--d-faint,#111)}
.sitem-check{
  width:15px;height:15px;border-radius:50%;border:1px solid var(--border);
  flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;
  font-size:8px;transition:all .2s;
}
.sitem-check.done{background:var(--d-color);border-color:var(--d-color);color:#000}
.sitem-title{font-size:11.5px;color:var(--muted);line-height:1.45}
.sitem.active .sitem-title{color:var(--text)}
.sitem-num{font-size:9px;color:var(--border);margin-top:2px;font-family:monospace}
.new-tag{font-size:8px;background:var(--d1);color:#fff;padding:1px 5px;border-radius:3px;margin-left:5px;font-family:monospace;letter-spacing:1px;vertical-align:middle}

/* ── MAIN CONTENT ── */
#main{flex:1;overflow-y:auto;background:var(--bg)}
#main::-webkit-scrollbar{width:5px}
#main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#content-wrap{max-width:800px;padding:32px 40px 60px}

/* ── INDEX PAGE ── */
#index-page{}
.index-title{font-size:28px;font-weight:normal;color:var(--text);margin-bottom:6px}
.index-sub{font-size:12px;color:var(--muted);font-family:monospace;letter-spacing:1px;margin-bottom:32px}
.index-stats{display:flex;gap:28px;margin-bottom:40px;padding-bottom:28px;border-bottom:1px solid var(--border)}
.stat-val{font-size:24px;font-weight:700;font-family:monospace}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px;font-family:monospace}
.domain-cards{display:flex;flex-direction:column;gap:12px}
.dcard{
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:20px;cursor:pointer;display:flex;gap:16px;align-items:center;
  transition:border-color .15s,background .15s;
}
.dcard:hover{background:var(--bg3)}
.dcard-icon{font-size:24px;flex-shrink:0}
.dcard-body{flex:1}
.dcard-top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.dcard-name{font-size:15px;color:var(--text)}
.dcard-weight{font-size:11px;font-family:monospace;font-weight:700}
.dcard-tagline{font-size:12px;color:var(--muted);line-height:1.5}
.dcard-bar-wrap{margin-top:10px;background:var(--faint);height:3px;border-radius:2px;width:100%}
.dcard-bar{height:100%;border-radius:2px}
.dcard-arrow{font-size:18px;color:var(--border);flex-shrink:0}

/* ── SECTION PAGE ── */
.section-header{margin-bottom:28px}
.section-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.section-meta-txt{font-size:10px;color:var(--muted);font-family:monospace;letter-spacing:2px}
.meta-line{flex:1;height:1px;background:var(--border)}
#mark-btn{
  border-radius:20px;padding:3px 14px;font-size:10px;font-family:monospace;
  border:1px solid var(--border);background:none;color:var(--muted);transition:all .2s;
}
.section-title{font-size:24px;font-weight:normal;color:var(--text);line-height:1.3}
.new-badge{display:inline-block;font-size:9px;background:var(--d1);color:#fff;
  padding:2px 7px;border-radius:3px;margin-left:10px;font-family:monospace;
  letter-spacing:1px;vertical-align:middle;position:relative;top:-2px}

.block-label{font-size:10px;color:var(--muted);font-family:monospace;letter-spacing:2px;margin-bottom:10px}
.concept-box{
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:22px;line-height:1.85;font-size:14.5px;color:#c8c0b4;
  white-space:pre-wrap;margin-bottom:24px;
}
.code-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
#toggle-code{background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:2px 10px;font-size:10px}
.code-box{
  background:#0d0d0f;border-radius:8px;padding:20px;
  font-family:'Courier New',monospace;font-size:12px;line-height:1.65;
  overflow-x:auto;border:1px solid #1e1e24;margin-bottom:24px;
}
.code-box pre{margin:0;white-space:pre}
.exam-tip{
  border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:32px;
  border-left:4px solid;
}
.exam-tip-label{font-size:10px;font-family:monospace;letter-spacing:2px;margin-bottom:7px;font-weight:700}
.exam-tip-text{font-size:13.5px;color:#aaa;line-height:1.7}

/* ── NAV FOOTER ── */
.nav-footer{display:flex;justify-content:space-between;align-items:center;padding-top:24px;border-top:1px solid var(--border)}
.nav-btn{border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:10px 20px;font-size:12px;background:none;transition:all .15s}
.nav-btn:hover:not(:disabled){background:var(--faint);color:var(--text)}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-btn.primary{border:none;color:#000}
.nav-center{text-align:center}
.nav-dots{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;max-width:220px;margin-top:6px}
.ndot{width:6px;height:6px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .2s;flex-shrink:0}
.nav-label{font-size:10px;color:var(--muted);font-family:monospace}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
</style>
