<script type="application/json" id="cca-data">
[{"id":1,"weight":27,"color":"#e05c3a","name":"Agentic Architecture & Orchestration","tagline":"The heaviest domain. Design multi-agent systems that work in production.","icon":"\u2699\ufe0f","sections":[{"title":"What Is an Agent?","content":"An agent is a Claude-powered system that can take actions autonomously \u2014 not just respond to a single prompt, but execute a sequence of steps, use tools, make decisions, and loop until a goal is met.\n\nA simple chat = one prompt \u2192 one response.\nAn agent = plan \u2192 act \u2192 observe \u2192 reflect \u2192 repeat until done.\n\nThe key distinction: agents have agency over their execution path. They decide which tools to call, in what order, and when to stop.\n\nAGENTIC LOOP STAGES:\n1. PLAN \u2014 Claude reads the task, decides the first action\n2. ACT \u2014 Claude calls a tool or writes output\n3. OBSERVE \u2014 Claude reads the tool result\n4. REFLECT \u2014 Claude decides next step based on result\n5. REPEAT \u2014 Continue until stop condition met\n\nSTOP CONDITIONS (always define these):\n- Task goal achieved (Claude determines completion)\n- Max iterations reached (hard limit \u2014 ALWAYS set this)\n- Human escalation triggered (ambiguity or compliance gate)\n- Unrecoverable error (fail-fast on critical failures)","code":"# The basic agentic loop \u2014 production-grade version\nimport anthropic\n\nclient = anthropic.Anthropic()\n\ndef run_agent(task: str, tools: list, max_iterations: int = 10) -> str:\n    messages = [{\"role\": \"user\", \"content\": task}]\n    \n    for iteration in range(max_iterations):\n        response = client.messages.create(\n            model=\"claude-sonnet-4-5\",\n            max_tokens=4096,\n            tools=tools,\n            messages=messages\n        )\n        \n        # Check stop reason\n        if response.stop_reason == \"end_turn\":\n            return response.content[0].text\n        \n        elif response.stop_reason == \"tool_use\":\n            messages.append({\"role\": \"assistant\", \"content\": response.content})\n            \n            tool_results = []\n            for block in response.content:\n                if block.type == \"tool_use\":\n                    result = execute_tool(block.name, block.input)\n                    tool_results.append({\n                        \"type\": \"tool_result\",\n                        \"tool_use_id\": block.id,\n                        \"content\": str(result)\n                    })\n            \n            messages.append({\"role\": \"user\", \"content\": tool_results})\n    \n    # ALWAYS have a max iterations guard \u2014 never loop forever\n    raise MaxIterationsError(f\"Task incomplete after {max_iterations} steps\")","examTip":"The exam tests when to use agents vs simple API calls. Use agents for: multi-step tasks where the path is unknown upfront, tasks requiring tool use, tasks that may need to loop. ALWAYS set max_iterations \u2014 infinite loops are the #1 agentic anti-pattern."},{"title":"Hub-and-Spoke Orchestration","content":"The most tested architecture pattern in Domain 1. A central coordinator agent manages the overall task and delegates to specialist subagents.\n\nCOORDINATOR (Hub):\n- Maintains overall task state\n- Decides which subagent to call next\n- Aggregates results from workers\n- Handles errors and retries at task level\n- The only agent that knows the full picture\n\nSUBAGENTS (Spokes):\n- Single-responsibility workers\n- Stateless \u2014 receive fresh context each call\n- Only know what they need for their specific job\n- Return structured results to the coordinator\n\nWHY THIS PATTERN WINS:\nWithout a coordinator, agents share too much context, create circular dependencies, and fail unpredictably. Hub-and-spoke isolates failure, keeps each agent's reasoning clean, and makes the system debuggable.\n\nWHEN TO USE IT:\n- Tasks with 3+ distinct phases\n- Tasks where different phases need different expertise\n- Any production multi-agent system","code":"# Hub-and-spoke pattern \u2014 correct implementation\nclass ResearchCoordinator:\n    def __init__(self):\n        self.state = {\"query\": None, \"sources\": [], \"draft\": None}\n    \n    async def run(self, query: str) -> str:\n        self.state[\"query\"] = query\n        \n        # Step 1: Delegate to search subagent\n        # KEY: Only pass what it needs, NOT self.state\n        sources = await self.call_subagent(\n            agent=\"SearchAgent\",\n            context={\"query\": query},        # Scoped context only\n            task=\"Find 5 relevant sources\"\n        )\n        self.state[\"sources\"] = sources\n        \n        # Step 2: Delegate to summarizer\n        summaries = await self.call_subagent(\n            agent=\"SummarizerAgent\",\n            context={\"sources\": sources},    # NOT the full state\n            task=\"Summarize each source in 3 sentences\"\n        )\n        \n        # Step 3: Delegate to writer\n        draft = await self.call_subagent(\n            agent=\"WriterAgent\",\n            context={\"query\": query, \"summaries\": summaries},\n            task=\"Write a 500-word research report\"\n        )\n        return draft\n\n# WRONG: passing full state to every subagent\nasync def bad_call(self, agent, task):\n    return await agent.run(\n        context=self.state,   # Context leakage \u2014 massive, mostly irrelevant\n        task=task\n    )","examTip":"TOP EXAM TRAP: Passing full conversation history or full system state to every subagent. The correct answer always scopes context \u2014 each subagent gets ONLY what it needs. Context leakage = expensive + degrades reasoning quality."},{"title":"Agent Lifecycle Hooks","content":"Hooks are the programmatic enforcement mechanism in the Agent SDK. They intercept execution at specific moments, allowing you to add validation, logging, access control, and safety checks WITHOUT relying on prompts.\n\nTHIS IS THE MOST TESTED CONCEPT IN THE ENTIRE EXAM.\n\nThe exam will present scenarios where something MUST happen (compliance check, financial threshold, identity verification) and ask how to enforce it. The answer is ALWAYS hooks \u2014 not adding more instructions to the system prompt.\n\nAVAILABLE HOOKS:\n- before_tool_call: runs before any tool executes. Can block, modify, or log.\n- after_tool_call: runs after a tool returns. Can validate output or log.\n- on_error: runs when any step fails. Decides retry, escalate, or abort.\n- on_completion: runs when agent finishes. Can validate final output.\n\nTHE GOLDEN RULE:\nPrompts are probabilistic \u2014 Claude will 'usually' follow them.\nHooks are deterministic \u2014 they always run, no exceptions.\nFor zero-tolerance requirements: hooks only, never prompts.","code":"# PROGRAMMATIC enforcement via hooks\n# Use when failure has financial, compliance, or safety consequences\n\n# CORRECT \u2014 programmatic gate via hook\n@hooks.before_tool_call\ndef enforce_financial_limit(tool_name: str, tool_input: dict):\n    if tool_name == \"process_payment\":\n        payment_amount = tool_input.get(\"amount\", 0)\n        if payment_amount > 10000:\n            raise PermissionError(\n                f\"Payment ${payment_amount} exceeds $10,000 limit. \"\n                \"Requires human approval.\"\n            )\n        audit_log.write(f\"Payment approved: ${payment_amount}\")\n\n@hooks.before_tool_call\ndef require_identity_check(tool_name: str, tool_input: dict):\n    SENSITIVE = [\"delete_record\", \"modify_permissions\", \"export_data\"]\n    if tool_name in SENSITIVE:\n        user_id = tool_input.get(\"user_id\")\n        if not verify_identity(user_id):\n            raise AuthorizationError(\"Identity verification required\")\n\n# WRONG \u2014 prompt-based enforcement\nSYSTEM = \"\"\"\nAlways verify user identity before deleting records.\nNever process payments over $10,000 without approval.\n\"\"\"\n# This is probabilistic. Claude will 'usually' follow it.\n# For compliance-critical flows, 'usually' is unacceptable.\n# An adversary CANNOT bypass a Python if-statement.","examTip":"MEMORIZE: 'When errors have financial, compliance, or safety consequences, relying on an LLM to usually follow instructions is NOT a valid architecture decision.' This is the core principle of this domain and appears across D1, D2, D3, and D4 questions."},{"title":"Task Decomposition Strategies","content":"How you break a complex task into subagent work determines cost, speed, reliability, and correctness.\n\nSEQUENTIAL DECOMPOSITION:\nTask A must finish before Task B starts.\nUse when: outputs are dependencies (B needs A's output).\nTrade-off: slower but correct for dependent tasks.\n\nPARALLEL DECOMPOSITION:\nTasks A, B, C run simultaneously.\nUse when: tasks are completely independent.\nTrade-off: faster and cheaper per unit time.\n\nCONDITIONAL DECOMPOSITION:\nPath chosen based on intermediate results.\nUse when: you don't know which steps are needed upfront.\n\nRECURSIVE DECOMPOSITION:\nA task spawns sub-tasks that may spawn further sub-tasks.\nUse when: task scope is genuinely open-ended.\nMUST have depth limits to prevent runaway cost.\n\nEXAM DECISION RULE: Check the dependency graph first. If tasks share no inputs/outputs \u2192 parallel. If B needs A's output \u2192 sequential.","code":"import asyncio\n\n# PARALLEL \u2014 independent tasks (faster, lower latency)\nasync def parallel_research(topics: list) -> list:\n    tasks = [search_agent(topic) for topic in topics]\n    results = await asyncio.gather(*tasks)  # All run simultaneously\n    return results\n    # 5 topics in parallel = same time as 1 topic\n\n# SEQUENTIAL \u2014 dependent tasks\nasync def sequential_pipeline(query: str) -> str:\n    sources = await search_agent(query)          # Step 1\n    summaries = await summarize_agent(sources)   # Needs sources\n    report = await write_agent(summaries)        # Needs summaries\n    return report\n\n# CONDITIONAL \u2014 path determined at runtime\nasync def adaptive_pipeline(request: str) -> str:\n    intent = await classify_agent(request)\n    \n    if intent == \"data_query\":\n        return await sql_agent(request)\n    elif intent == \"document_analysis\":\n        return await doc_agent(request)\n    else:\n        return await general_agent(request)\n\n# WRONG \u2014 sequential for independent tasks\nasync def wasteful(topics: list) -> list:\n    results = []\n    for topic in topics:\n        result = await search_agent(topic)  # Waits for each!\n        results.append(result)              # 5x slower than parallel\n    return results","examTip":"The exam shows a scenario and asks which decomposition is appropriate. Key signal: 'These tasks can run independently' means parallel. 'Each step needs the previous step output' means sequential. Choosing sequential for independent tasks is always the wrong answer."},{"title":"Token Economics & Context Isolation","content":"Every token costs money and consumes context window space. Poor context management is one of the most common agentic anti-patterns.\n\nCONTEXT LEAKAGE:\nPassing the full conversation history or full system state to every subagent.\n- Inflates token usage by 5-10x in multi-agent systems\n- Puts irrelevant information in subagent context, degrading reasoning\n- Can exceed context limits mid-task\n\nMODEL SELECTION FOR COST:\nNot every step needs Claude Opus. Use the cheapest model that can do the job:\n- Classification, routing, simple extraction \u2192 claude-haiku (fastest, cheapest)\n- Reasoning, analysis, code generation \u2192 claude-sonnet (balanced)\n- Complex multi-step planning, nuanced judgment \u2192 claude-opus (most capable)\n\nTOKEN BUDGET PLANNING:\n- System prompt: ~500-2000 tokens (fixed cost per call)\n- Task context: only the inputs the subagent needs\n- Tool results: often the biggest variable \u2014 truncate aggressively\n- Output budget: set max_tokens per task, not one-size-fits-all","code":"# BAD \u2014 context leakage\nasync def bad_summarizer(full_history, sources, user_prefs, config):\n    response = await client.messages.create(\n        messages=full_history,      # 50,000 tokens \u2014 mostly irrelevant\n        system=f\"Config: {config}, Prefs: {user_prefs}\",\n        model=\"claude-opus-4-5\"     # Most expensive model for summarization!\n    )\n\n# GOOD \u2014 scoped context, right-sized model\nasync def good_summarizer(sources: list) -> list:\n    response = await client.messages.create(\n        model=\"claude-haiku-4-5\",   # Cheap model for simple summarization\n        max_tokens=500,              # Constrain output\n        system=\"Summarize each source in 3 sentences. Return JSON array.\",\n        messages=[{\n            \"role\": \"user\",\n            \"content\": f\"Sources: {json.dumps(sources)}\"\n            # Only the sources. Nothing else.\n        }]\n    )\n    return json.loads(response.content[0].text)\n\n# Token budget for a 5-step pipeline\nTOTAL_WINDOW = 200_000        # Claude Sonnet 4.5\nSYSTEM_TOKENS = 1_500\nSAFETY_HEADROOM = 10_000\nAVAILABLE = 188_500           # = TOTAL - SYSTEM - HEADROOM\nPER_STEP = AVAILABLE // 5     # ~37,700 tokens per step","examTip":"Model selection is exam content. Know the Haiku/Sonnet/Opus tradeoffs. The exam will ask which model fits which step. Classifying intent = Haiku. Reasoning through tradeoffs = Sonnet. Opus only for the most complex multi-step reasoning tasks."},{"title":"Failure Recovery Patterns","content":"Production agents fail. The question is whether they fail gracefully or catastrophically.\n\nLOCAL RETRY: Subagent retries its own failed step.\nUse for: transient errors (network timeout, rate limit).\nMax retries: 3 with exponential backoff.\n\nCOORDINATOR RETRY: Coordinator re-dispatches with modified context.\nUse when: local retry exhausted, coordinator can provide better context.\n\nFALLBACK PATH: If primary agent fails after N retries, route to simpler fallback.\nUse for: non-critical paths where degraded output is acceptable.\n\nHUMAN ESCALATION: Pause and request human input when agent cannot proceed.\nUse for: ambiguous situations, compliance boundaries, high-stakes decisions.\n\nFAIL-FAST: Immediately abort and report when a critical gate fails.\nUse for: compliance-critical operations where proceeding on error causes harm.\n\nEXAM DECISION RULE:\nCan task succeed with degraded quality? Use fallback.\nCould proceeding on error cause harm? Use fail-fast.","code":"import asyncio\n\n# LOCAL RETRY with exponential backoff\nasync def with_retry(agent_fn, context, max_retries=3):\n    for attempt in range(max_retries):\n        try:\n            return await agent_fn(context)\n        except TransientError:\n            if attempt == max_retries - 1:\n                raise\n            await asyncio.sleep(2 ** attempt)  # 1s, 2s, 4s\n\n# FAIL-FAST for compliance-critical steps\nasync def compliance_step(agent_fn, context):\n    try:\n        result = await agent_fn(context)\n        if not validate_compliance(result):\n            raise ComplianceError(\"Output failed compliance check\")\n        return result\n    except Exception as e:\n        alert_compliance_team(e)  # Always alert\n        raise  # Never swallow \u2014 surface immediately\n\n# HUMAN ESCALATION when agent is stuck\nasync def with_escalation(agent_fn, context, max_attempts=3):\n    for attempt in range(max_attempts):\n        try:\n            result = await agent_fn(context)\n            if result.confidence > 0.8:\n                return result\n        except UnresolvableError:\n            pass\n    \n    # Cannot resolve \u2014 escalate to human\n    guidance = await human_queue.submit({\n        \"context\": context,\n        \"attempts\": max_attempts,\n        \"reason\": \"Agent unable to proceed with sufficient confidence\"\n    })\n    return await agent_fn({**context, \"human_guidance\": guidance})","examTip":"The exam loves 'human in the loop' questions. Use human escalation when: ambiguity is high AND stakes are high, OR when the agent has looped N times without progress. Use FAIL-FAST when proceeding with a wrong answer is worse than not proceeding at all."},{"title":"The 7 Agentic Anti-Patterns","content":"These are the exam traps. Wrong answers in Domain 1 almost always describe one of these 7 patterns.\n\n1. CONTEXT BLOAT\nPassing full conversation history to every subagent.\nFix: scope context \u2014 each subagent gets only what it needs.\n\n2. PROMPT-BASED COMPLIANCE GATES\nUsing system prompt instructions to enforce compliance rules.\nFix: use lifecycle hooks or programmatic validators.\n\n3. INFINITE LOOPS\nNo max_iterations limit on the agentic loop.\nFix: always set a hard max iterations limit.\n\n4. MONOLITHIC AGENT\nOne giant agent trying to do everything with no specialization.\nFix: hub-and-spoke with specialized subagents.\n\n5. IMPLICIT STATE\nAgents share state through global variables instead of explicit context passing.\nFix: explicit context objects passed between agents.\n\n6. IGNORING TOOL ERRORS\nPassing a failed tool result back to Claude as if it succeeded.\nFix: validate tool results; inject specific error context.\n\n7. NO CONFIDENCE THRESHOLD\nAgent presents uncertain outputs as confident answers without flagging.\nFix: build confidence scoring; route low-confidence outputs to human review.","code":"# The 7 anti-patterns with fixes\n\n# 1. Context bloat\nawait subagent.run(context=full_conversation_history)  # BAD\nawait subagent.run(context={\"task_inputs\": only_what_it_needs})  # GOOD\n\n# 2. Prompt-based compliance\nSYSTEM = \"Always verify identity before deleting records.\"  # BAD\n@hooks.before_tool_call  # GOOD\ndef require_identity(tool, inputs):\n    if tool == \"delete_record\" and not verified(inputs[\"user_id\"]):\n        raise AuthError(\"Identity required\")\n\n# 3. Infinite loop\nwhile True:  # BAD\n    result = await agent.step()\nfor i in range(MAX_ITER := 10):  # GOOD\n    result = await agent.step()\n    if result.done: break\nelse:\n    raise MaxIterError(f\"Incomplete after {MAX_ITER} steps\")\n\n# 4. Monolithic agent\nawait one_giant_agent.do_everything(task)  # BAD\nawait coordinator.run(task)  # GOOD \u2014 delegates to specialists\n\n# 5. Implicit state\nSHARED_STATE[\"results\"] = output  # BAD \u2014 race condition!\nreturn {\"results\": output}  # GOOD \u2014 explicit return\n\n# 6. Ignoring tool errors\nresult = call_db(query)\nmessages.append({\"role\": \"tool\", \"content\": str(result)})  # BAD even if errored\nif result.is_error:  # GOOD\n    messages.append({\"role\": \"tool\", \"content\": f\"ERROR: {result.message}. Try differently.\"})\n\n# 7. No confidence threshold\nreturn response.answer  # BAD \u2014 even if uncertain\nif response.confidence < 0.75:  # GOOD\n    return human_review_queue.submit(response)","examTip":"On the exam: if an answer describes using a system prompt to enforce a compliance rule it is wrong. If an answer describes passing full conversation history to a subagent it is wrong. These two traps appear in MULTIPLE questions across multiple scenarios."},{"title":"stop_reason \u2014 The Correct Loop Termination Pattern","content":"One of the most specific exam traps: how do you know when an agentic loop should stop?\n\nWRONG APPROACH \u2014 Natural language parsing:\nReading Claude's text output and checking if it 'sounds like' it is done.\nThis is fragile, expensive, and breaks on unexpected phrasings.\n\nCORRECT APPROACH \u2014 Check stop_reason:\nThe API returns a machine-readable stop_reason field on every response.\nThis is the authoritative signal for loop control.\n\nSTOP_REASON VALUES:\n- end_turn: Claude finished its response naturally. Task may be complete.\n- tool_use: Claude wants to call a tool. Execute it and continue the loop.\n- max_tokens: Output was cut off. May need to increase max_tokens or handle continuation.\n- stop_sequence: A stop sequence was triggered. Usually task-complete signal.\n\nWHY THIS MATTERS:\nParsing natural language to detect completion is an anti-pattern. What if Claude says 'I have almost finished the task'? Your parser breaks. stop_reason never ambiguous \u2014 it is a typed enum value from the API.","code":"# CORRECT \u2014 check stop_reason, never parse natural language\ndef run_agent(task: str, tools: list) -> str:\n    messages = [{\"role\": \"user\", \"content\": task}]\n    \n    for _ in range(MAX_ITERATIONS):\n        response = client.messages.create(\n            model=\"claude-sonnet-4-5\",\n            tools=tools,\n            messages=messages\n        )\n        \n        # stop_reason is the ONLY reliable termination signal\n        if response.stop_reason == \"end_turn\":\n            # Claude decided it is done \u2014 extract final answer\n            return next(\n                block.text for block in response.content\n                if hasattr(block, 'text')\n            )\n        \n        elif response.stop_reason == \"tool_use\":\n            # Claude wants a tool \u2014 execute and continue\n            messages.append({\"role\": \"assistant\", \"content\": response.content})\n            tool_results = execute_all_tools(response.content)\n            messages.append({\"role\": \"user\", \"content\": tool_results})\n        \n        elif response.stop_reason == \"max_tokens\":\n            # Output was truncated \u2014 increase max_tokens or handle continuation\n            raise TokenLimitError(\"Response truncated \u2014 increase max_tokens\")\n    \n    raise MaxIterationsError(\"Loop limit reached\")\n\n# WRONG \u2014 parsing text output to detect completion\ndef bad_loop(task):\n    while True:\n        response = call_claude(task)\n        text = response.content[0].text\n        # This will break on unexpected Claude phrasing\n        if \"task complete\" in text.lower() or \"finished\" in text.lower():\n            return text  # Brittle and unreliable","examTip":"The exam specifically tests this. Wrong answer: 'parse the response text to determine if the agent is done.' Correct answer: check stop_reason == end_turn. This is not a style preference \u2014 it is the architecturally correct approach and checking stop_reason is required for reliable loop control."},{"title":"The Task Tool \u2014 Native Multi-Agent Delegation","content":"The Task tool is Claude's built-in mechanism for spawning subagents. When Claude calls the Task tool, it creates a new Claude instance with its own context, runs it to completion, and returns the result to the parent.\n\nTHIS IS DIFFERENT FROM MANUALLY CALLING THE API:\nWith the Task tool, Claude itself decides to delegate. With direct API calls, your code decides when to delegate. Both patterns have their place \u2014 but the exam tests when to use each.\n\nTASK TOOL CHARACTERISTICS:\n- Creates a new Claude instance with isolated context (no parent history)\n- Runs the subagent to completion before returning\n- Returns only the final output \u2014 not the subagent's reasoning steps\n- The subagent cannot call the Task tool recursively by default\n\nWHEN TO USE TASK TOOL:\n- When the coordinator needs to delegate a well-defined subtask\n- When context isolation between tasks is important\n- When you want Claude to manage delegation decisions, not your code\n\nWHEN TO USE DIRECT API CALLS:\n- When you need precise control over the delegation logic\n- When you need to inspect intermediate steps\n- When you are building a custom orchestration system","code":"# The Task tool \u2014 how Claude uses it natively\n# You provide the Task tool definition; Claude decides when to call it\n\nTASK_TOOL = {\n    \"name\": \"Task\",\n    \"description\": (\n        \"Spawn a subagent to complete a specific, well-defined task. \"\n        \"The subagent has its own isolated context. \"\n        \"Use this for tasks that can be fully specified upfront and \"\n        \"whose output can be used independently.\"\n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"description\": {\n                \"type\": \"string\",\n                \"description\": \"What the subagent should do\"\n            },\n            \"prompt\": {\n                \"type\": \"string\",\n                \"description\": \"The full task prompt for the subagent\"\n            }\n        },\n        \"required\": [\"description\", \"prompt\"]\n    }\n}\n\n# When Claude calls Task, you execute a fresh API call:\ndef handle_task_tool(tool_input: dict) -> str:\n    subagent_prompt = tool_input[\"prompt\"]\n    \n    # Fresh context \u2014 no parent conversation history\n    result = client.messages.create(\n        model=\"claude-sonnet-4-5\",\n        max_tokens=4096,\n        messages=[{\"role\": \"user\", \"content\": subagent_prompt}]\n        # Notice: no tools by default \u2014 subagent is focused\n    )\n    return result.content[0].text\n    # Only the final output is returned to the parent agent","examTip":"The Task tool is Claude's native delegation mechanism \u2014 it creates an isolated subagent instance. The exam tests the key property: the subagent gets NO parent conversation history. Context isolation is automatic and complete. This is different from just making another API call with the same messages."},{"title":"Session Management & State Persistence","content":"Session management covers how an agent maintains continuity within a run AND across runs.\n\nWITHIN-SESSION STATE:\nAll tool results accumulate in the messages array automatically. This is working memory for the current task. You do not need to do anything special -- but you must manage its growth to avoid hitting context limits.\n\nACROSS-SESSION STATE:\nWhen a session ends, ALL in-context state is lost. The next run starts completely fresh. To persist anything across sessions you must explicitly save it to an external store before the session ends.\n\nSESSION ISOLATION IN MULTI-AGENT SYSTEMS:\nEach subagent runs in its own isolated session. Subagent A cannot read Subagent B's message history. There is NO automatic shared memory between agents. If Subagent B needs Subagent A's findings, the coordinator must explicitly pass them.\n\nEXAM TRAP:\nScenario: Agent A retrieved 50 sources. Agent B needs to summarize them.\nWrong answer: Agent B automatically has access to Agent A's retrieved sources.\nCorrect answer: The coordinator explicitly passes the sources to Agent B in its prompt.\n\nSESSION MANAGEMENT PATTERNS:\n- Checkpointing: save progress at each major step so a crash can resume\n- Session tokens: unique IDs to correlate related agent runs\n- State serialization: convert agent state to JSON for storage between runs","code":"import json, redis\nredis_client = redis.Redis(host='redis-service', port=6379)\n\nclass StatefulAgent:\n    def __init__(self, session_id: str):\n        self.checkpoint_key = f'agent:checkpoint:{session_id}'\n\n    async def run(self, task: str) -> str:\n        # Try to resume from checkpoint if interrupted\n        checkpoint = self.load_checkpoint()\n        if checkpoint:\n            messages = checkpoint['messages']\n        else:\n            messages = [{'role': 'user', 'content': task}]\n\n        for step in range(MAX_STEPS):\n            response = await call_claude(messages)\n            # Save progress after every step -- resume on crash\n            self.save_checkpoint({'messages': messages, 'step': step})\n\n            if response.stop_reason == 'end_turn':\n                self.clear_checkpoint()\n                return response.content[0].text\n\n            messages.append({'role': 'assistant', 'content': response.content})\n            messages.append({'role': 'user', 'content': execute_tools(response)})\n\n    def save_checkpoint(self, s): redis_client.setex(self.checkpoint_key, 3600, json.dumps(s))\n    def load_checkpoint(self):\n        d = redis_client.get(self.checkpoint_key)\n        return json.loads(d) if d else None\n    def clear_checkpoint(self): redis_client.delete(self.checkpoint_key)\n\n# ACROSS-SESSION: explicit passing between subagents\n# NO automatic memory sharing -- EVER\nasync def multi_agent_pipeline(query: str):\n    sources = await agent_a.run(f'Find sources for: {query}')\n    # WRONG: await agent_b.run('Summarize what you just saw')\n    # CORRECT: pass explicitly in the prompt\n    return await agent_b.run(f'Summarize these sources:\\n{json.dumps(sources)}')","examTip":"MEMORIZE: There is NO shared memory between agents. Each session is fully isolated. If Subagent B needs Subagent A data, the coordinator must pass it explicitly. This is the most common wrong answer in multi-agent questions: 'Agent B automatically has access to what Agent A retrieved.' It does not."},{"title":"Error Propagation Across Agents","content":"When an error occurs in a subagent, how it propagates through the multi-agent chain is a distinct exam topic from single-agent failure recovery.\n\nTHE PROBLEM:\nIn a 4-agent pipeline (Coordinator, Search, Summarize, Write), if Search fails, does Summarize get blank input? Does Coordinator know? Does the pipeline crash silently?\n\nERROR PROPAGATION PATTERNS:\n1. BUBBLE UP: Subagent returns structured error to coordinator. Coordinator decides next action. Best for recoverable errors.\n2. PARTIAL RESULTS: Subagent returns what it completed with an error flag. Pipeline continues with partial data. Best for non-critical steps.\n3. HARD STOP: Any subagent failure immediately terminates pipeline. Best for compliance-critical pipelines where partial results are dangerous.\n4. COMPENSATING ACTION: Coordinator triggers cleanup in other agents on failure. Best for pipelines with side effects.\n\nWHAT NOT TO DO:\n- Swallow errors silently and pass empty results downstream\n- Let subagent exceptions propagate as unhandled errors\n- Pass raw stack traces to the next agent as its input\n\nERROR TYPES:\n- Transient: retry the subagent\n- Logic errors: coordinator chooses alternative path\n- Data errors: partial results with confidence flags\n- Compliance violations: hard stop always, never continue","code":"from dataclasses import dataclass\nfrom typing import Any\n\n@dataclass\nclass AgentResult:\n    success: bool\n    data: Any\n    error_type: str | None = None    # TRANSIENT, LOGIC, DATA, COMPLIANCE\n    error_message: str | None = None\n    partial_data: Any = None\n    is_retryable: bool = False\n\nclass ResearchCoordinator:\n    async def run(self, query: str) -> AgentResult:\n        result = await self.call_subagent('search', {'query': query})\n\n        if not result.success:\n            if result.error_type == 'TRANSIENT' and result.is_retryable:\n                result = await self.call_subagent('search', {'query': query})\n            elif result.error_type == 'COMPLIANCE':\n                # Hard stop -- never continue past compliance failure\n                await self.alert_compliance_team(result)\n                return AgentResult(success=False, data=None,\n                    error_type='COMPLIANCE',\n                    error_message='Pipeline halted: compliance violation')\n            elif result.partial_data:\n                pass  # Continue with partial data\n            else:\n                # Propagate failure -- do NOT swallow\n                return AgentResult(success=False, data=None,\n                    error_type=result.error_type,\n                    error_message=f'Search failed: {result.error_message}')\n\n        sources = result.data or result.partial_data\n        summarize = await self.call_subagent('summarize', {'sources': sources})\n        return AgentResult(success=True, data=summarize.data)\n\n# WRONG: silent error swallowing\nasync def bad_pipeline(query):\n    try:\n        sources = await search_agent(query)\n    except Exception:\n        sources = []  # Swallowed -- summarizer gets empty input, produces garbage","examTip":"Error propagation is tested in the Multi-Agent Research scenario. Key question: 'The search agent fails. What should happen?' Correct: structured error returned to coordinator who decides (retry/partial/halt). Wrong: swallowing errors silently, crashing with unhandled exception, or continuing with null data."},{"title":"Escalation Design \u2014 Sentiment vs Complexity","content":"A specific exam anti-pattern: using sentiment (how upset a user sounds) as the escalation trigger instead of actual task complexity or confidence.\n\nTHE WRONG PATTERN:\nIf the user message contains 'urgent', 'frustrated', or 'terrible' then escalate to human. This is wrong because sentiment does not indicate whether the agent CAN handle the task.\n\nTHE CORRECT PATTERN:\nEscalate when: the agent's confidence is below threshold, OR the task genuinely requires human judgment the agent lacks.\n\nEXAM QUESTION FORMAT:\n'The customer support agent should escalate when ___.' Wrong answers include sentiment signals. Correct answer references confidence scores, task complexity, or compliance boundaries.\n\nESCALATION DECISION MATRIX:\n- HIGH confidence + LOW complexity: handle autonomously\n- HIGH confidence + HIGH complexity: handle with extra validation\n- LOW confidence + LOW complexity: handle with uncertainty flag\n- LOW confidence + HIGH complexity: ESCALATE\n- ANY + COMPLIANCE BOUNDARY: ALWAYS ESCALATE\n- ANY + CRITICAL urgency (actual system down): ALWAYS ESCALATE\n\nNOTE: CRITICAL urgency justifies escalation because it signals real system impact, not because the user sounded upset.","code":"# WRONG -- sentiment-based escalation\ndef should_escalate_bad(message: str) -> bool:\n    UPSET_WORDS = ['urgent', 'frustrated', 'terrible', 'awful', 'angry']\n    # Escalating because user sounds upset -- WRONG\n    if any(word in message.lower() for word in UPSET_WORDS):\n        return True\n    return False\n\n# CORRECT -- complexity and confidence-based escalation\ndef should_escalate(\n    task_complexity: str,       # LOW, MEDIUM, HIGH\n    agent_confidence: float,    # 0.0 - 1.0\n    requires_compliance: bool,\n    urgency_level: str          # LOW, MEDIUM, HIGH, CRITICAL\n) -> tuple:\n\n    # Compliance boundary -- always escalate\n    if requires_compliance:\n        return True, 'Compliance review required'\n\n    # CRITICAL urgency = actual system impact -- escalate\n    if urgency_level == 'CRITICAL':\n        return True, 'Critical system impact -- immediate human attention'\n\n    # Low confidence -- escalate regardless of complexity\n    if agent_confidence < 0.70:\n        return True, f'Confidence {agent_confidence:.0%} below threshold'\n\n    # High complexity + medium confidence -- escalate\n    if task_complexity == 'HIGH' and agent_confidence < 0.85:\n        return True, 'Complex task requires human validation'\n\n    return False, 'Handling autonomously'\n\n# Note: NO sentiment analysis in this function\n# Sentiment = feeling. Complexity = capability boundary.","examTip":"EXAM TRAP: Any answer that says 'escalate when the user sounds frustrated or uses urgent language' is wrong. Correct escalation triggers: confidence below threshold, compliance boundary reached, CRITICAL urgency (actual system impact), or task beyond agent capability. Sentiment is never a valid escalation trigger."}]},{"id":2,"weight":18,"color":"#3aace0","name":"Tool Design & MCP Integration","tagline":"Connect Claude to the world. Design tools that are safe, reliable, and composable.","icon":"\ud83d\udd27","sections":[{"title":"What Is MCP?","content":"Model Context Protocol (MCP) is an open standard for connecting AI models to external tools, data sources, and services. Think of it as USB-C for AI \u2014 a universal connector that any model can plug into any tool through a standardized interface.\n\nBEFORE MCP: Every team wrote custom integration code. No reusability, no standards, constant maintenance.\n\nWITH MCP: Build an MCP server once. Any MCP-compatible client can use it.\n\nMCP ARCHITECTURE COMPONENTS:\n- MCP HOST: The application running Claude (your FastAPI app, etc.)\n- MCP CLIENT: The MCP protocol handler inside the host\n- MCP SERVER: A separate process exposing tools/resources/prompts\n- TRANSPORT: How host and server communicate (stdio or SSE)\n\nTHE 3 MCP PRIMITIVES \u2014 memorize these:\n1. TOOLS \u2014 actions Claude can take (have side effects, like calling an API)\n2. RESOURCES \u2014 data Claude can read (read-only, like a file or DB record)\n3. PROMPTS \u2014 reusable prompt templates with parameters","code":"# MCP Server \u2014 all 3 primitives\nfrom mcp.server import Server\nimport mcp.types as types\n\napp = Server(\"enterprise-data-server\")\n\n# PRIMITIVE 1: TOOLS \u2014 actions with side effects\n@app.list_tools()\nasync def list_tools() -> list[types.Tool]:\n    return [types.Tool(\n        name=\"query_database\",\n        description=\"Execute a read-only SQL query. Use for retrieving data.\",\n        inputSchema={\n            \"type\": \"object\",\n            \"properties\": {\n                \"sql\": {\"type\": \"string\"},\n                \"limit\": {\"type\": \"integer\", \"default\": 100, \"maximum\": 1000}\n            },\n            \"required\": [\"sql\"]\n        }\n    )]\n\n# PRIMITIVE 2: RESOURCES \u2014 read-only data sources\n@app.list_resources()\nasync def list_resources() -> list[types.Resource]:\n    return [types.Resource(\n        uri=\"file:///data/schema.json\",\n        name=\"Database Schema\",\n        description=\"Current DB schema \u2014 read before writing queries\",\n        mimeType=\"application/json\"\n    )]\n\n# PRIMITIVE 3: PROMPTS \u2014 reusable templates\n@app.list_prompts()\nasync def list_prompts() -> list[types.Prompt]:\n    return [types.Prompt(\n        name=\"analyze_data\",\n        description=\"Template for structured data analysis\",\n        arguments=[\n            types.PromptArgument(name=\"dataset\", required=True)\n        ]\n    )]","examTip":"KNOW THE 3 PRIMITIVES COLD: Tools = actions with side effects. Resources = read-only data. Prompts = reusable templates. The exam asks which primitive to use for a given need. 'Read the schema' = Resource. 'Run a query' = Tool. 'Standard analysis template' = Prompt."},{"title":"MCP vs Inline Tool Use","content":"This is a key architectural decision the exam tests directly.\n\nUSE MCP WHEN:\n- The tool will be used by multiple agents or applications\n- The tool needs to run in a separate process (isolation, security)\n- The tool represents a stable, reusable capability\n- You need versioning or team ownership separation\n- Tool set is large (5+ tools that could be grouped into a service)\n\nUSE INLINE TOOL USE WHEN:\n- The tool is specific to one task and one agent only\n- Simple enough to define in the API call\n- No cross-agent reusability needed\n- Simplest possible architecture for a one-off workflow\n\nTHINK OF MCP LIKE A MICROSERVICE:\nWorth the overhead when you need reusability, isolation, and independent deployment.\nOverkill for simple single-purpose single-agent tools.","code":"# INLINE tool use \u2014 for one-off, single-agent tools\nresponse = client.messages.create(\n    model=\"claude-sonnet-4-5\",\n    tools=[{\n        \"name\": \"get_weather\",\n        \"description\": \"Get current weather for a city\",\n        \"input_schema\": {\n            \"type\": \"object\",\n            \"properties\": {\"city\": {\"type\": \"string\"}},\n            \"required\": [\"city\"]\n        }\n    }],\n    messages=[{\"role\": \"user\", \"content\": \"Weather in Tokyo?\"}]\n)\n# Use inline when: simple, one agent, no reuse needed\n\n# MCP server \u2014 for shared, production-grade tools\n# mcp_server.py \u2014 deployed independently, shared by all agents\n@app.call_tool()\nasync def call_tool(name: str, args: dict):\n    if name == \"query_database\":\n        return execute_sql(args[\"sql\"], args.get(\"limit\", 100))\n    elif name == \"send_notification\":\n        return notification_service.send(args)\n# Use MCP when: 3+ agents need this tool\n\n# EXAM SCENARIO:\n# '5 different agents all need database access. How do you provide it?'\n# CORRECT Answer: MCP server with query_database tool\n# WRONG Answer: Define the tool inline in each of the 5 agents","examTip":"The '5 agents need the same tool' scenario directly tests MCP vs inline. Answer: MCP server. Also know: MCP enables independent deployment and versioning of tools, which matters for enterprise teams where different squads own different capabilities."},{"title":"Tool Boundary Design","content":"How you design tool interfaces dramatically affects agent reasoning quality, cost, and safety.\n\nGRANULARITY PRINCIPLE:\nToo coarse = Claude cannot target specific actions.\nToo fine = too many tool calls, high reasoning overhead.\nSweet spot = one tool per distinct action.\n\nNAMING PRINCIPLE:\nTools = action verbs: query_records, send_email, create_invoice\nResources = nouns: user_schema, product_catalog\n\nDESCRIPTIONS MATTER:\nThe description IS Claude's interface. It must specify when to use this tool, when NOT to use it, what inputs are required, and what it returns.\n\nPREVENTING REASONING OVERLOAD:\n4-5 tools per agent is the exam-specified maximum for reliable tool selection. More than 5 = Claude selection quality degrades significantly.\n\nSAFETY IN SCHEMA:\nConstrain inputs using JSON schema enums, ranges, and patterns.\nDo not rely on descriptions alone for safety \u2014 use schema constraints.","code":"# BAD tool design \u2014 vague, unsafe, unbound\n{\n    \"name\": \"database_operation\",         # Too vague\n    \"description\": \"Interact with the database\",  # No guidance\n    \"input_schema\": {\n        \"properties\": {\n            \"action\": {\"type\": \"string\"},  # Unbounded string\n            \"data\": {\"type\": \"object\"}     # Unstructured\n        }\n    }\n}\n\n# GOOD tool design \u2014 specific, safe, schema-constrained\n{\n    \"name\": \"query_records\",\n    \"description\": (\n        \"Execute a read-only SELECT query. Use to retrieve records. \"\n        \"DO NOT use for INSERT, UPDATE, or DELETE operations.\"\n    ),\n    \"input_schema\": {\n        \"type\": \"object\",\n        \"properties\": {\n            \"table\": {\n                \"type\": \"string\",\n                \"enum\": [\"orders\", \"customers\", \"products\"]  # Constrained!\n            },\n            \"filters\": {\"type\": \"object\"},\n            \"limit\": {\n                \"type\": \"integer\",\n                \"maximum\": 1000,   # Hard cap in schema\n                \"default\": 100\n            }\n        },\n        \"required\": [\"table\"]\n    }\n}\n# Rule: if you can use 'enum' or 'maximum' instead of describing\n# a constraint in text \u2014 use the schema. It's enforced by the SDK.","examTip":"The exam shows poorly designed tools and asks what's wrong. Look for: too-broad names, missing descriptions, unbound string inputs where enums could constrain, and tools that mix read/write operations. Schema constraints beat description-based constraints every time. AND: 4-5 tools max per agent \u2014 not 5-15. If you need more tools, split across specialized subagents."},{"title":"Programmatic Tool Interception","content":"The most powerful safety mechanism in MCP. Before any tool executes, you can intercept the call, validate inputs, check permissions, log the action, and either allow or block it deterministically.\n\nThis is the same principle as lifecycle hooks in Domain 1, applied at the MCP server level. The mechanism sits outside Claude's reasoning, making it reliable regardless of what the agent decides.\n\nLAYERED GATE PATTERN (in order):\n1. Authentication \u2014 is the caller authenticated?\n2. Authorization \u2014 does the caller have permission for this specific tool?\n3. Input Validation \u2014 is the input safe and within bounds?\n4. Rate Limiting \u2014 is the caller within usage limits?\n5. Execution \u2014 all gates passed, run the tool\n6. Audit Logging \u2014 log all calls regardless of outcome\n\nEach gate is independent. Failure at any gate blocks execution.","code":"@app.call_tool()\nasync def call_tool(name: str, arguments: dict):\n    user_id = arguments.get(\"user_id\")\n    \n    # GATE 1: Authentication\n    if not user_id or not is_authenticated(user_id):\n        audit_log(user_id, name, \"DENIED:unauthenticated\")\n        return error(\"Authentication required\")\n    \n    # GATE 2: Authorization\n    if name == \"query_production_db\":\n        if not has_permission(user_id, \"production_read\"):\n            audit_log(user_id, name, \"DENIED:no_permission\")\n            return error(\"Access denied\")\n    \n    # GATE 3: Input Sanitization\n    if \"sql\" in arguments:\n        sql = arguments[\"sql\"].upper()\n        BLOCKED = [\"DROP\", \"DELETE\", \"INSERT\", \"UPDATE\", \"TRUNCATE\"]\n        for keyword in BLOCKED:\n            if keyword in sql:\n                audit_log(user_id, name, f\"BLOCKED:{keyword}\")\n                return error(f\"Operation blocked: {keyword} not permitted\")\n    \n    # GATE 4: Rate Limiting\n    if not rate_limiter.check(user_id, name):\n        return error(\"Rate limit exceeded\")\n    \n    # All gates passed\n    audit_log(user_id, name, \"ALLOWED\")\n    result = await execute_tool(name, arguments)\n    return [types.TextContent(type=\"text\", text=json.dumps(result))]\n\n# Claude CANNOT bypass any of these through creative prompting.","examTip":"Gates should be layered: Auth then Authz then Input Validation then Rate Limiting then Execution then Audit. Each gate is independent. This pattern appears in the Customer Support Agent scenario (refunds need identity check) and Data Extraction scenario (writes need authorization)."},{"title":"MCP Transport: stdio vs SSE","content":"How your MCP server communicates with the host determines your deployment architecture.\n\nSTDIO TRANSPORT:\n- MCP server runs as a subprocess of the host application\n- Communication via standard input/output pipes\n- Best for: local tools, development, CLI workflows, Claude Desktop\n- Lifecycle tied to the host process\n- Cannot serve multiple hosts simultaneously\n\nHTTP/SSE TRANSPORT:\n- MCP server runs as an independent HTTP server\n- Communication via Server-Sent Events over HTTP\n- Best for: production deployments, remote servers, multi-client scenarios\n- Independently scalable and deployable\n- Can serve multiple host applications simultaneously\n\nFOR OPENSHIFT PRODUCTION:\nSSE transport. Deploy MCP server as its own Deployment + Service + Route. Multiple FastAPI apps connect to it over HTTP. Independent scaling, independent deployment.","code":"# STDIO \u2014 for local development\nasync def main():\n    async with stdio_server.stdio_server() as streams:\n        await app.run(streams[0], streams[1],\n                      app.create_initialization_options())\n# Host starts this as a subprocess\n\n# SSE \u2014 for production OpenShift deployment\nfrom mcp.server.sse import SseServerTransport\nfrom starlette.applications import Starlette\nfrom starlette.routing import Route, Mount\nimport uvicorn\n\nsse = SseServerTransport(\"/messages\")\n\nasync def handle_sse(request):\n    async with sse.connect_sse(\n        request.scope, request.receive, request._send\n    ) as streams:\n        await app.run(streams[0], streams[1],\n                      app.create_initialization_options())\n\nstarlette_app = Starlette(routes=[\n    Route(\"/sse\", endpoint=handle_sse),\n    Mount(\"/messages\", app=sse.handle_post_message),\n])\n\nif __name__ == \"__main__\":\n    uvicorn.run(starlette_app, host=\"0.0.0.0\", port=8080)\n\n# OpenShift: Deployment -> Service (port 8080) -> Route\n# All your FastAPI apps set MCP_URL=http://mcp-service:8080/sse","examTip":"Exam scenario: 'You need to share an MCP server between 3 Claude applications in a Kubernetes cluster.' Answer: SSE transport, deployed as independent Service. stdio would require all 3 apps to co-locate on the same host \u2014 not viable in Kubernetes."},{"title":"Tool Count Limit \u2014 4 to 5 Tools Max","content":"CORRECTION TO A COMMON MISCONCEPTION: The exam guide specifies 4-5 tools as the maximum for reliable Claude tool selection \u2014 not 5-15 as some guides suggest.\n\nWHY 4-5 MAX:\nClaude's tool selection quality degrades as the number of tools increases. With more than 5 tools, Claude spends a disproportionate amount of context reasoning about which tool to call, and selection errors increase significantly.\n\nIF YOU NEED MORE TOOLS:\nSplit them across multiple specialized agents, each with 4-5 focused tools.\nUse a routing layer that selects the right subagent based on task type.\nThis is better architecture regardless of the tool limit.\n\nEXAM TRAP:\nA question will describe an agent with 18 tools. Every answer option that suggests keeping 18 tools is wrong. The correct answer always involves splitting tools across specialized subagents.","code":"# WRONG \u2014 one agent with too many tools (18 tools)\nagent_with_18_tools = Agent(\n    tools=[\n        search_web, query_db, send_email, create_ticket,\n        update_record, delete_record, generate_report,\n        parse_document, translate_text, summarize_content,\n        check_inventory, process_payment, verify_identity,\n        send_notification, schedule_task, export_data,\n        import_data, run_analytics\n    ]  # 18 tools = unreliable selection, wasted context\n)\n\n# CORRECT \u2014 split across specialized subagents (4-5 tools each)\ndata_agent = Agent(\n    tools=[search_web, query_db, parse_document, summarize_content]\n)  # 4 tools \u2014 focused, reliable\n\ncommunication_agent = Agent(\n    tools=[send_email, create_ticket, send_notification, schedule_task]\n)  # 4 tools \u2014 focused, reliable\n\nfinance_agent = Agent(\n    tools=[process_payment, verify_identity, export_data, generate_report]\n)  # 4 tools \u2014 focused, reliable\n\n# Coordinator routes to the right specialist\ncoordinator = Agent(\n    tools=[delegate_to_data, delegate_to_comms, delegate_to_finance]\n)  # 3 delegation tools","examTip":"CORRECTION: The exam guide specifies 4-5 tools max per agent \u2014 not 5-15. Giving an agent 18 tools is a specific wrong answer the exam uses as a trap. The correct architecture always splits tools across specialized subagents. Memorize: 4-5 tools max, then split."},{"title":"MCP Configuration \u2014 .mcp.json","content":"MCP servers are configured in a .mcp.json file at the project root. This tells Claude Code (and other MCP hosts) which servers are available, how to start them, and what environment variables they need.\n\nFILE LOCATION: .mcp.json in your project root (committed to version control).\n\nCONFIGURATION STRUCTURE:\n- Each key is the server name (used to reference the server)\n- type: stdio or sse\n- command: how to start the server (for stdio)\n- url: server endpoint (for sse)\n- env: environment variables the server needs\n\nMULTIPLE SERVERS: You can configure multiple MCP servers in one file. Claude selects tools from all connected servers, so tool naming must be unique across servers.\n\nSECURITY: Never commit secrets in .mcp.json. Use environment variable references (process.env.MY_SECRET) or separate secret management.","code":"# .mcp.json \u2014 project root, committed to version control\n{\n  \"mcpServers\": {\n    \"database\": {\n      \"type\": \"stdio\",\n      \"command\": \"python\",\n      \"args\": [\"mcp_servers/database_server.py\"],\n      \"env\": {\n        \"DB_HOST\": \"${DB_HOST}\",\n        \"DB_PORT\": \"${DB_PORT}\",\n        \"DB_NAME\": \"${DB_NAME}\"\n        // Reference env vars \u2014 never hardcode credentials\n      }\n    },\n    \"notifications\": {\n      \"type\": \"stdio\",\n      \"command\": \"node\",\n      \"args\": [\"mcp_servers/notification_server.js\"],\n      \"env\": {\n        \"SLACK_TOKEN\": \"${SLACK_TOKEN}\"\n      }\n    },\n    \"remote-analytics\": {\n      \"type\": \"sse\",\n      \"url\": \"http://analytics-mcp-service:8080/sse\"\n      // SSE server running in OpenShift \u2014 no local command needed\n    }\n  }\n}\n\n// For Claude Code: this file tells it which MCP servers to connect at startup\n// For production apps: load this config and connect to servers programmatically\n\n// Tools from all servers are available to Claude:\n// database.query_records, notifications.send_slack, remote-analytics.run_report","examTip":".mcp.json is the project-level MCP configuration file committed to version control. Know the structure: mcpServers object, each entry has type (stdio or sse), command or url, and env. Never hardcode secrets \u2014 always reference environment variables. This appears in the Claude Code CI/CD scenario."},{"title":"Tool Error Structure \u2014 isError, isRetryable, errorCategory","content":"When a tool fails, how you structure the error response back to Claude determines whether Claude can recover gracefully or gets confused.\n\nTHE WRONG WAY: Returning raw exception text or generic error messages.\nClaude will try to interpret unstructured errors and often make incorrect assumptions.\n\nTHE RIGHT WAY: Return structured error objects with machine-readable fields.\n\nKEY ERROR FIELDS:\n- isError: boolean \u2014 tells Claude definitively that the tool failed\n- isRetryable: boolean \u2014 tells Claude whether retrying might succeed\n- errorCategory: string enum \u2014 categorizes the error type for routing\n- message: string \u2014 human-readable description\n- details: object \u2014 optional structured context\n\nERROR CATEGORIES (know these):\n- TRANSIENT: temporary failure, retry is likely to succeed (network timeout)\n- INVALID_INPUT: Claude sent bad parameters, retry with same inputs will fail\n- PERMISSION_DENIED: authorization failure, retry will not help\n- NOT_FOUND: resource does not exist\n- RATE_LIMITED: too many requests, retry after delay\n\nWHY THIS MATTERS:\nClaude uses isRetryable and errorCategory to decide its next action. A structured TRANSIENT error tells Claude to try again. An INVALID_INPUT error tells Claude to reformulate its request. Without structure, Claude guesses.","code":"import mcp.types as types\n\n# WRONG \u2014 unstructured error response\n@app.call_tool()\nasync def bad_call_tool(name: str, arguments: dict):\n    try:\n        result = await execute(name, arguments)\n        return [types.TextContent(type=\"text\", text=str(result))]\n    except Exception as e:\n        # Returning raw exception \u2014 Claude has to guess what happened\n        return [types.TextContent(type=\"text\", text=f\"Error: {str(e)}\")]\n\n# CORRECT \u2014 structured error response\n@app.call_tool()\nasync def good_call_tool(name: str, arguments: dict):\n    try:\n        result = await execute(name, arguments)\n        return [types.TextContent(\n            type=\"text\",\n            text=json.dumps({\"success\": True, \"data\": result})\n        )]\n    \n    except NetworkTimeoutError:\n        return [types.TextContent(type=\"text\", text=json.dumps({\n            \"isError\": True,\n            \"isRetryable\": True,           # Tell Claude it can retry\n            \"errorCategory\": \"TRANSIENT\",   # Machine-readable category\n            \"message\": \"Database connection timeout\",\n            \"details\": {\"retry_after_seconds\": 2}\n        }))]\n    \n    except ValidationError as e:\n        return [types.TextContent(type=\"text\", text=json.dumps({\n            \"isError\": True,\n            \"isRetryable\": False,            # Same inputs will fail again\n            \"errorCategory\": \"INVALID_INPUT\",\n            \"message\": f\"Invalid parameter: {e.field}\",\n            \"details\": {\"invalid_field\": e.field, \"constraint\": e.constraint}\n        }))]\n    \n    except PermissionError:\n        return [types.TextContent(type=\"text\", text=json.dumps({\n            \"isError\": True,\n            \"isRetryable\": False,\n            \"errorCategory\": \"PERMISSION_DENIED\",\n            \"message\": \"Insufficient permissions for this operation\"\n        }))]","examTip":"Know the 5 error categories: TRANSIENT (retry ok), INVALID_INPUT (reformulate request), PERMISSION_DENIED (stop and escalate), NOT_FOUND (resource missing), RATE_LIMITED (retry after delay). The exam tests: given this error, what should Claude do next? The answer depends entirely on the error category."},{"title":"Tool Description Quality \u2014 The Real Selection Driver","content":"The exam tests this specifically: Claude selects tools based on the DESCRIPTION field, not the function name and not the parameter names.\n\nWHY DESCRIPTIONS ARE THE INTERFACE:\nFrom Claude's perspective, the description is everything. It reads descriptions to know when to use each tool, what input it expects, and what it returns. If two tools have similar vague descriptions, Claude guesses -- and often guesses wrong.\n\nWHAT A GOOD DESCRIPTION INCLUDES:\n1. When to use this tool (trigger conditions)\n2. When NOT to use it (explicit exclusions)\n3. What the input format should be\n4. What the output looks like\n5. Explicit boundaries between similar tools\n\nTHE OVERLAPPING TOOLS PROBLEM:\nIf you have search_web and search_docs with minimal descriptions, Claude picks arbitrarily. Fix: explicit boundary descriptions.\n'Use search_web for external public information. Use search_docs for internal company documents only.'\n\nNO SHARED MEMORY REMINDER:\nIn multi-agent systems, the tool description is what the subagent reads. Since there is no shared memory between agents, descriptions must be completely self-contained.","code":"# BAD tool descriptions -- overlapping, vague\nBAD_TOOLS = [\n    {\n        'name': 'search_web',\n        'description': 'Search for information',  # Too vague\n        'input_schema': {'properties': {'query': {'type': 'string'}}}\n    },\n    {\n        'name': 'search_docs',\n        'description': 'Search documents',  # Overlapping\n        'input_schema': {'properties': {'query': {'type': 'string'}}}\n    }\n    # Claude will guess between these -- wrong answers guaranteed\n]\n\n# GOOD tool descriptions -- explicit boundaries\nGOOD_TOOLS = [\n    {\n        'name': 'search_web',\n        'description': (\n            'Search the public internet for current external information. '\n            'Use for: news, public docs, general knowledge, competitors. '\n            'Do NOT use for: internal company documents or private data. '\n            'Returns: list of {url, title, snippet} objects.'\n        ),\n        'input_schema': {\n            'type': 'object',\n            'properties': {\n                'query': {'type': 'string'},\n                'max_results': {'type': 'integer', 'default': 5, 'maximum': 20}\n            },\n            'required': ['query']\n        }\n    },\n    {\n        'name': 'search_docs',\n        'description': (\n            'Search internal company documents and knowledge base ONLY. '\n            'Use for: company policies, internal procedures, past project docs. '\n            'Do NOT use for: public information available online. '\n            'Returns: list of {doc_id, title, excerpt} objects.'\n        ),\n        'input_schema': {\n            'type': 'object',\n            'properties': {\n                'query': {'type': 'string'},\n                'department': {'type': 'string', 'enum': ['engineering', 'hr', 'finance', 'all']}\n            },\n            'required': ['query']\n        }\n    }\n]\n# With explicit boundaries, Claude NEVER confuses these two tools","examTip":"The exam tests this directly: 'An agent sometimes calls search_docs when it should call search_web. Most likely cause?' Answer: overlapping or vague descriptions. Fix: rewrite with explicit trigger conditions and explicit boundaries between similar tools. The description IS the interface -- treat it like an API contract."},{"title":"Prompt Caching \u2014 50% Cost Reduction for Repeated Context","content":"Prompt caching reduces cost when the same large context is reused across multiple API calls. It is distinct from the Message Batches API.\n\nHOW IT WORKS:\nMark content with cache_control. Anthropic caches it after the first call. Subsequent calls using the same cached content pay 90% less for those tokens.\n\nCOST STRUCTURE:\n- Cache write (first call): slightly more expensive (cache creation fee)\n- Cache read (all subsequent calls): 90% cheaper than normal\n- Net result: massive savings when large context is reused 2+ times\n\nWHEN TO USE:\n- Large system prompts reused across many calls\n- Same document queried multiple times\n- Agent workflows where same instructions go to many subagent calls\n\nWHEN NOT TO USE:\n- One-off calls where context is never reused\n- Very short prompts (overhead not worth it)\n- Frequently changing content (cache invalidates on any change)\n\nCRITICAL DIFFERENCE FROM BATCHES:\nBatches = process many DIFFERENT requests asynchronously at 50% cost.\nCaching = reuse the SAME large context across calls at 90% cache-read savings.","code":"import anthropic\nclient = anthropic.Anthropic()\n\nLARGE_SYSTEM = '[10,000 token system prompt with all rules, examples, tool descriptions...]'\n\n# WITHOUT caching: 1000 calls x 10,000 tokens = 10,000,000 tokens at full price\n\n# WITH caching: mark the static content\nresponse = client.messages.create(\n    model='claude-sonnet-4-5',\n    max_tokens=1024,\n    system=[\n        {\n            'type': 'text',\n            'text': LARGE_SYSTEM,\n            'cache_control': {'type': 'ephemeral'}  # Mark for caching\n        }\n    ],\n    messages=[{'role': 'user', 'content': user_query}]\n)\n# First call: cache write (slightly higher cost)\n# Next 999 calls: 90% cheaper on those 10,000 tokens\n# Total: roughly 10% of original cost\n\n# Check cache usage\nprint(response.usage.cache_creation_input_tokens)  # Tokens written\nprint(response.usage.cache_read_input_tokens)       # Tokens read from cache\n\n# DOCUMENT ANALYSIS: same doc, 100 questions\ndoc_content = load_large_document()  # 50,000 token document\nfor question in user_questions:\n    response = client.messages.create(\n        model='claude-sonnet-4-5',\n        max_tokens=500,\n        messages=[{'role': 'user', 'content': [\n            {'type': 'text', 'text': doc_content,\n             'cache_control': {'type': 'ephemeral'}},  # Cache the doc\n            {'type': 'text', 'text': question}          # Question not cached\n        ]}]\n    )\n# 100 questions: 1 cache write + 99 cache reads = massive savings","examTip":"Know the difference: Batches API = async processing of many DIFFERENT requests, 50% cost saving. Prompt caching = reusing the SAME large context across calls, 90% cheaper on cached reads. Exam signal: 'same document queried 100 times' = caching. '5,000 different invoices to process overnight' = batches. They solve different problems."}]},{"id":3,"weight":20,"color":"#3ae07a","name":"Claude Code Configuration & Workflows","tagline":"Claude as a coding agent. Configure it to work the way your team works.","icon":"\ud83d\udcbb","sections":[{"title":"What Is Claude Code?","content":"Claude Code is an agentic coding tool that runs in your terminal. It reads your codebase, understands context, and can write, edit, test, and run code \u2014 not just suggest it.\n\nKEY DIFFERENCE FROM A CODING ASSISTANT:\nClaude Code ACTS. It opens files, edits them, runs tests, checks errors, and iterates until the task is done.\n\nCORE CAPABILITIES:\n- Read any file in your codebase for context\n- Edit files directly (with your permission)\n- Run bash commands, tests, and linters\n- Search the web for documentation\n- Use git (status, commit, branch, PR creation)\n- Connect to MCP servers for extended capabilities\n\n3 MODES OF OPERATION:\n1. INTERACTIVE: Conversational session in your terminal\n2. NON-INTERACTIVE (headless): Run with --print flag, outputs to stdout and exits\n3. SDK: Programmatic control from Python or Node.js\n\nDomain 3 is the most hands-on domain \u2014 install Claude Code and use it before your exam.","code":"# Install\nnpm install -g @anthropic-ai/claude-code\n\n# Interactive session\nclaude\n# Then type: \"fix the failing tests in src/api/\"\n\n# Common usage\nclaude \"refactor the database module to use async/await\"\nclaude \"add input validation to all FastAPI endpoints\"\nclaude \"write unit tests for the auth module\"\n\n# NON-INTERACTIVE (headless) \u2014 key exam topic\nclaude --print \"What does the DatabaseManager class do?\"\n# Outputs answer to stdout and exits\n\nclaude --print --output-format json \"List all API endpoints\"\n# Outputs JSON\n\n# With tool restrictions (important for CI)\nclaude --print --allowedTools \"Read,Grep,Glob\" \"Analyze code quality\"\n# Claude can only read, not write or run commands\n\n# Stdin piping\necho \"Review this function for bugs\" | claude --print\n\n# Required environment variable\nexport ANTHROPIC_API_KEY=\"your-key-here\"","examTip":"Know the key flags: --print (non-interactive, outputs and exits), --output-format json (structured output), --allowedTools (whitelist), --disallowedTools (blacklist), --dangerously-skip-permissions (for fully automated CI). These appear in the CI/CD and Developer Productivity scenarios."},{"title":"CLAUDE.md Hierarchy","content":"CLAUDE.md is not a README. It is a persistent instruction set that Claude Code reads at startup and treats as its architectural contract. Think of it as the project tech lead document that Claude internalizes before touching any code.\n\nTHREE LEVELS \u2014 read in order, later levels can override earlier for conflicts:\n\nGLOBAL (~/.claude/CLAUDE.md):\n- Your personal developer preferences\n- Code style, preferred tools, personal shortcuts\n- Applies to ALL projects on your machine\n- NOT committed to version control\n\nPROJECT (./CLAUDE.md \u2014 repo root):\n- Team-shared architectural rules\n- Naming conventions, forbidden patterns, required code structures\n- Framework and library choices for this project\n- COMMITTED to version control \u2014 entire team uses it\n\nLOCAL (.claude/CLAUDE.md \u2014 subdirectory):\n- Override rules for specific parts of the codebase\n- Directory-specific conventions\n- Can be committed or gitignored\n\nANALOGY FOR YOUR WORK:\nGlobal CLAUDE.md = personal dev preferences\nProject CLAUDE.md = OpenShift cluster-level config\nLocal CLAUDE.md = deployment-specific config overrides\nSame layered config hierarchy you already use every day.","code":"# PROJECT CLAUDE.md \u2014 COMMIT THIS to your repo\n# This is the team architectural contract\n\n## Project: OTG Config Platform\n## Stack: FastAPI + React TypeScript + Oracle\n\n## Architecture Rules (NON-NEGOTIABLE)\n- NEVER write inline SQL. All DB ops through oracle_utils.py stored packages.\n- ALL API endpoints must use async/await.\n- Authentication always via JWT middleware \u2014 never bypass it.\n- RBAC checks must use PKG_RBAC \u2014 never inline permission logic.\n\n## Naming Conventions\n- FastAPI routes: snake_case (get_user_reports, create_dag_config)\n- React components: PascalCase (UserManagementPage, DagConfigForm)\n- Oracle packages: PKG_{DOMAIN} (PKG_RBAC, PKG_DAG, PKG_REPORTS)\n- Env vars: UPPER_SNAKE_CASE, service-prefixed (DB_HOST, JWT_SECRET)\n\n## Forbidden Patterns\n- No raw SQL strings in Python code\n- No hardcoded credentials or connection strings\n- No direct Oracle cursor usage outside oracle_utils.py\n\n## Response Format\n- Always include Python type hints\n- Always include error handling with specific exception types\n- Always write docstrings for public functions\n- Tests required for any new public function","examTip":"The exam tests CLAUDE.md hierarchy specifics. Know: global = personal (~/.claude/CLAUDE.md), project = team rules (./CLAUDE.md, committed), local = subdirectory overrides (.claude/CLAUDE.md). Putting team rules in global CLAUDE.md is wrong. One giant flat file with everything is wrong."},{"title":"Skills & Custom Slash Commands","content":"Skills and slash commands let you define reusable workflows that Claude Code follows consistently \u2014 across your whole team.\n\nSKILLS (defined in CLAUDE.md with frontmatter):\nDefine structured workflows for specific task types. Claude Code reads these and applies them when the matching task type is detected.\n\nCUSTOM SLASH COMMANDS (.claude/commands/*.md):\nSave any prompt or workflow as a /command. Anyone on the team can call it. Checked into version control = consistent behavior for everyone.\n\nWHY THIS MATTERS:\nWithout skills and commands, every developer gets slightly different Claude Code behavior. With them, your team has codified best practices that Claude follows consistently \u2014 like having a senior dev's review process automated and always available.","code":"# In CLAUDE.md \u2014 define skills with frontmatter syntax\n\n---\nname: add-api-endpoint\ndescription: Add a new FastAPI endpoint following OTG conventions\n---\n\nWhen adding a new API endpoint:\n1. Create the route function in the appropriate router file\n2. Add Pydantic request/response models in models/\n3. Place business logic in services/ NOT directly in the route\n4. Route ALL DB operations through oracle_utils.py stored procedures\n5. Add @require_auth JWT authentication decorator\n6. Add RBAC permission check via PKG_RBAC.check_permission()\n7. Write tests: success case, auth failure, invalid input (min 3)\n\nNever put SQL in route functions.\n\n---\nname: review-pr\ndescription: Review a PR for OTG standards\n---\n\nCheck all changed files for:\n- Inline SQL: any .execute() with SQL string -> BLOCK\n- Missing async/await on DB calls -> WARN\n- New code without tests -> BLOCK\nReturn JSON: {\"violations\": [], \"warnings\": [], \"approved\": bool}\n\n# .claude/commands/security-check.md\n# Usage: /security-check\n\nAudit codebase for security vulnerabilities:\n1. Hardcoded secrets or API keys\n2. SQL injection risks\n3. Missing authentication on endpoints\n4. Sensitive data in log statements\nReturn JSON: {\"critical\": [], \"high\": [], \"medium\": []}","examTip":"The skills frontmatter syntax (---name, description---) is exam-specific knowledge. Slash commands live in .claude/commands/ as .md files. The exam tests: where do you define team-wide workflows? In project CLAUDE.md as skills, committed to version control."},{"title":"Claude Code Hooks","content":"Claude Code hooks are shell commands that run at specific points in Claude's workflow. They provide programmatic enforcement at the Claude Code level.\n\nHOOK EVENTS:\n- PreToolUse: runs before any tool is executed. Non-zero exit = tool call blocked.\n- PostToolUse: runs after tool execution. Can validate, log, or transform output.\n- Notification: runs when Claude sends a notification to the user.\n- Stop: runs when Claude is about to stop.\n\nHOOK EXIT CODES \u2014 CRITICAL exam knowledge:\n- Exit 0 = allow the action to proceed\n- Non-zero exit = block the action\n- Claude reads your script's stderr output as the reason for blocking\n\nHOOK CONFIGURATION:\nDefined in settings.json \u2014 either global (~/.claude/settings.json) or project (.claude/settings.json). Project hooks are committed to version control and shared with the team.","code":"# .claude/settings.json\n{\n  \"hooks\": {\n    \"PreToolUse\": [{\n      \"matcher\": \"Bash\",\n      \"hooks\": [{\n        \"type\": \"command\",\n        \"command\": \"python .claude/hooks/validate_bash.py\"\n      }]\n    }],\n    \"PostToolUse\": [{\n      \"matcher\": \"Edit\",\n      \"hooks\": [{\n        \"type\": \"command\",\n        \"command\": \"python .claude/hooks/check_standards.py\"\n      }]\n    }]\n  }\n}\n\n# .claude/hooks/validate_bash.py\nimport sys, json\n\ntool_input = json.loads(sys.stdin.read())\ncommand = tool_input.get(\"command\", \"\")\n\nBLOCKED = [\"rm -rf /\", \"DROP TABLE\", \"chmod 777\"]\nfor pattern in BLOCKED:\n    if pattern in command:\n        print(f\"BLOCKED: Forbidden pattern: {pattern}\", file=sys.stderr)\n        sys.exit(1)  # Non-zero = BLOCK the tool call\n\nsys.exit(0)  # Zero = ALLOW\n\n# .claude/hooks/check_standards.py\nimport sys, json, re\n\ntool_input = json.loads(sys.stdin.read())\nnew_content = tool_input.get(\"new_content\", \"\")\n\nif re.search(r'cursor\\.execute\\s*\\([\\'\"]SELECT', new_content):\n    print(\"BLOCKED: Inline SQL. Use oracle_utils.py\", file=sys.stderr)\n    sys.exit(1)\n\nsys.exit(0)","examTip":"EXIT CODES ARE CRITICAL: 0 = allow, non-zero = block. Claude reads stderr as the reason. Hooks provide DETERMINISTIC enforcement \u2014 Claude cannot edit a file with inline SQL because the PostToolUse hook blocks it. This is programmatic enforcement at the Claude Code level."},{"title":"Headless Mode & CI/CD Integration","content":"Headless mode allows Claude Code to run non-interactively in scripts, cron jobs, and CI/CD pipelines.\n\nKEY FLAGS FOR HEADLESS MODE:\n--print: Output to stdout, then exit\n--output-format json: Return structured JSON\n--allowedTools: Comma-separated whitelist\n--disallowedTools: Comma-separated blacklist\n--dangerously-skip-permissions: Skip all prompts (for fully automated CI)\n\nENVIRONMENT SETUP FOR CI:\n- ANTHROPIC_API_KEY must be set as a CI secret\n- Working directory must be your repository root\n- Claude Code reads project CLAUDE.md automatically\n\nWHAT YOU CAN DO IN CI:\n- Automated PR review against team standards\n- Security vulnerability scanning\n- Test generation for new code\n- Documentation updates\n- Refactoring validation","code":"# GitHub Actions CI integration\nname: Claude Code Review\non: [pull_request]\njobs:\n  review:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: actions/setup-node@v4\n        with: { node-version: '20' }\n      - run: npm install -g @anthropic-ai/claude-code\n      \n      - name: Security Review\n        env:\n          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}\n        run: |\n          claude --print \\\n            --output-format json \\\n            --allowedTools \"Read,Grep,Glob\" \\\n            \"Review changed files for: security issues, missing auth,\n             inline SQL. Return JSON: {violations: [], passed: bool}\"\n      \n      - name: Generate Tests\n        env:\n          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}\n        run: |\n          claude --print \\\n            --allowedTools \"Read,Write,Grep\" \\\n            --disallowedTools \"Bash\" \\\n            \"Write unit tests for all new functions in this PR\"\n\n# Local headless\nREVIEW=$(claude --print --output-format json \\\n  --allowedTools \"Read,Grep\" \\\n  \"Check for anti-patterns defined in CLAUDE.md\")\n\nif [ $(echo \"$REVIEW\" | jq '.violations | length') -gt 0 ]; then\n  echo \"Failed\" && exit 1\nfi","examTip":"Exam scenario: 'How do you integrate Claude Code into a CI pipeline?' Know: 1) npm install, 2) set ANTHROPIC_API_KEY secret, 3) use --print for non-interactive, 4) --allowedTools to whitelist safe operations, 5) --dangerously-skip-permissions for fully automated runs."},{"title":"Plan Mode vs Direct Execution","content":"Claude Code has two distinct execution modes that the exam specifically tests:\n\nDIRECT EXECUTION MODE (default):\nClaude reads the task, forms a plan internally, and immediately starts making changes. No explicit approval step before actions.\nUse when: you trust the task scope, you want fast iteration, the stakes of a wrong action are low.\n\nPLAN MODE (--plan flag or 'think before acting'):\nClaude first produces an explicit plan \u2014 a numbered list of what it intends to do \u2014 and shows it to you before taking any action. You can approve, modify, or reject the plan.\nUse when: the task is complex or risky, you want to verify approach before any files change, you are running headlessly and want human checkpoint.\n\nWHEN THE EXAM TESTS THIS:\nScenario: 'You are integrating Claude Code into a CI pipeline for a production codebase. You want to ensure Claude's approach is reviewed before any files are modified.' Answer: use plan mode, review the plan output, then allow execution.\n\nKEY DIFFERENCE:\nPlan mode adds a human-in-the-loop checkpoint before any irreversible actions. This is programmatic enforcement of human review \u2014 the same principle as hooks, but at a higher level.","code":"# Plan mode \u2014 Claude shows intent before acting\n\n# Interactive: type 'plan' or use /plan slash command in Claude Code session\n# Claude produces numbered plan, waits for your approval before proceeding\n\n# CLI flag approach\nclaude --plan \"Refactor the auth module to use async/await\"\n# Output:\n# Plan:\n# 1. Read auth/auth_manager.py to understand current structure\n# 2. Identify all synchronous DB calls (lines 45, 67, 89)\n# 3. Convert each to async/await pattern\n# 4. Update function signatures to async def\n# 5. Run tests to verify no regressions\n# Proceed? [y/n]\n\n# In CI pipeline \u2014 plan mode for safety review\n#!/bin/bash\nPLAN=$(claude --print --plan \\\n  --allowedTools \"Read,Grep\" \\\n  \"Migrate all print() calls to logging module\")\n\necho \"Proposed plan:\"\necho \"$PLAN\"\n\n# Human reviews the plan output before allowing execution\n# In automated CI, you might parse the plan and reject based on criteria\n\n# Direct execution mode \u2014 no checkpoint\nclaude \"Fix the typo in README.md\"  # Immediate action, no plan shown\n\n# Rule: use plan mode whenever the action is reversible-only-with-effort\n# Rule: use direct execution for small, safe, clearly-scoped tasks","examTip":"Plan mode is human-in-the-loop enforcement before irreversible file changes. The exam tests: when would you use plan mode vs direct execution? Use plan mode whenever the task is complex, risky, or when you need audit trail of intended cha
